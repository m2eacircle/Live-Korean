  <style>
    .cat-hero {
      background: linear-gradient(135deg,#ecfeff 0%,#cffafe 60%,#e0f7fa 100%);
      border:1.5px solid var(--border); border-radius:var(--radius);
      padding:28px 24px 24px; margin-bottom:32px;
      position:relative; overflow:hidden;
    }
    .cat-hero-img { position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.18; }
    .cat-hero-inner { position:relative;z-index:1; }
    .cat-hero-eyebrow { font-size:0.72rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#0891b2;margin-bottom:6px; }
    .cat-hero-title { font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:600;font-style:italic;color:var(--text);line-height:1.25;margin-bottom:8px; }
    .cat-hero-sub { font-size:0.82rem;color:var(--muted);max-width:520px;line-height:1.6; }
    .shorts-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:48px; }
    .short-card { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--transition); }
    .short-card:hover { border-color:#0891b2;box-shadow:0 8px 28px #0891b222;transform:translateY(-2px); }
    .short-thumb { width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#ecfeff 0%,#cffafe 60%,#e0f7fa 100%);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center; }
    .short-play-btn { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.22);transition:var(--transition); }
    .short-card:hover .short-play-btn { background:#0891b255; }
    .short-play-icon { width:48px;height:48px;background:rgba(255,255,255,0.92);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 16px rgba(0,0,0,0.2); }
    .short-num { position:absolute;top:10px;left:10px;background:#0891b2;color:#fff;font-size:0.65rem;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:0.3px; }
    .short-body { padding:14px 16px 16px; }
    .short-show { font-size:0.68rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#0891b2;margin-bottom:4px; }
    .short-title-en { font-family:'Syne',sans-serif;font-size:0.88rem;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:2px; }
    .short-title-ko { font-size:0.82rem;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:8px;font-family:'Noto Sans KR',sans-serif;display:none; }
    .short-desc-en, .short-desc-ko { font-size:0.77rem;color:var(--muted);line-height:1.55;margin-bottom:10px; }
    .short-desc-ko { display:none; }
    .lang-ko .short-title-en, .lang-ko .short-desc-en { display:none; }
    .lang-ko .short-title-ko, .lang-ko .short-desc-ko { display:block; }
    .short-tags { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px; }
    .short-tag { font-size:0.65rem;font-weight:600;padding:3px 9px;border-radius:12px;background:var(--card2);color:var(--accent2);border:1px solid var(--border); }
    .short-actions { display:flex;gap:8px; }
    .btn-watch { flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:#0891b2;color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 14px;font-size:0.78rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:var(--transition);text-decoration:none; }
    .btn-watch:hover { opacity:0.88; }
    .btn-watch.pending { background:var(--card2);color:var(--muted);cursor:default; }
    .btn-watch.pending:hover { background:var(--card2); }
  </style>

    desc_ko:'예능 출연은 전략적 기능을 합니다: 아이돌의 인간화·팬 이외의 대중 인지도 구축·예능감 증명. 예능에서 친근하게 다가가는 능력을 친근감이라 하며 음악만으로는 줄 수 없는 매력입니다.',

    desc_ko:'먹방과 먹기 도전은 한국의 독특하게 강렬한 음식 문화를 반영합니다. 잘 먹는 것을 보는 것은 대리 만족을 유발합니다. 먹기 도전은 또한 뚝심을 시험합니다.',

    desc_ko:'만나자마자 나이를 묻는 것은 한국의 표준 관행입니다. 나이가 말투(존댓말 vs 반말)·절 깊이·양보 방식을 결정합니다. 나이는 개인 정보가 아니라 사회적 인프라입니다.',

    desc_ko:'한국 리얼리티 쇼는 참가자들이 카메라 앞에서 혼자 진짜 감정을 드러내는 고백 세그먼트를 사용합니다. 눈치가 침묵을 요구했던 것을 말할 수 있는 공인된 공간을 줍니다.',

    desc_ko:'한국 예능에서 지는 것은 보통 벌칙 — 밀가루를 뒤집어쓰거나 끔찍한 것을 먹는 신체적 결과로 이어집니다. 이는 공동체적 신체 유머에 대한 한국 문화의 수용을 반영합니다.',

  {

    desc_ko:'한국 최고의 예능 MC는 수십 년의 무대 경험을 가진 코미디언입니다. 한국 MC는 리액션 기술·분위기 파악·즉흥 연기를 전문적으로 훈련합니다.',
    tags:['MC','리액션 기술','분위기 파악','comedian culture'], url:''

    desc_ko:'몰래카메라(몰카)는 사회적 퍼포먼스 없이 진짜 반응을 보여줍니다. 체면이 모든 가시적 행동을 형성하는 한국 문화에서, 여과 없는 속마음을 보는 것은 깊이 매력적입니다.',
    tags:['몰카','체면','속마음','겉 vs 속'], url:''
  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',
    title_en:'Why Korean Shows Love the Unexpected Expert Reveal', title_ko:'한국 예능이 예상치 못한 전문가 반전을 좋아하는 이유',
    desc_en:'Korean variety loves revealing that someone is secretly excellent at an unexpected skill. This resonates because it challenges 선입견 (preconception) — deeply satisfying in a culture that strongly categorises people by 스펙 (qualifications). The 반전 of expectations is a core entertainment pleasure in Korea.',
    desc_ko:'한국 예능은 누군가가 예상치 못한 기술에 비밀스럽게 뛰어나다는 것을 밝히는 것을 좋아합니다. 스펙으로 사람을 강하게 범주화하는 문화에서 선입견에 도전하기 때문에 공감을 얻습니다.',

  },
  {

    tags:['함께 먹기','차려주다','food as care','relationship reveal'], url:''

  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',
    title_en:'Why Korean Shows Produce So Many Viral Moments', title_ko:'한국 방송이 그토록 많은 바이럴 순간을 만들어내는 이유',
    desc_en:'Korean variety produces 짤 (short clips/GIFs — from 짤방, meaning clipped broadcast) that circulate independently. The 짤 culture reflects Korean internet culture\'s embrace of 리믹스 (remixing) and 드립 (witty improvised jokes). A single great reaction shot can become a 짤 that outlives the episode by years.',
    desc_ko:'한국 예능은 프로그램과 독립적으로 유통되는 짤(짤방)을 만들어냅니다. 짤 문화는 리믹스와 드립(재치 있는 즉흥 농담)을 수용하는 한국 인터넷 문화를 반영합니다.',

    tags:['원 스톱 연예','cross-promotion','ecosystem','vertical integration'], url:''

  {
    show_en:'Korean Culture', show_ko:'한국 문화',

var LABELS = {
  en: { section:'🎤 30 Featured Shorts', watch:'▶ Watch Short', pending:'▶ Short Coming Soon' },

};

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildGrid() {
  var isKo = getLang()==='ko', lang = isKo?'ko':'en';
  var h = HERO[lang], lb = LABELS[lang];
  document.getElementById('hero-eyebrow').textContent  = h.eyebrow;
  document.getElementById('hero-title').textContent    = h.title;
  document.getElementById('hero-sub').textContent      = h.sub;
  document.getElementById('section-label').textContent = lb.section;
  document.body.className = isKo ? 'lang-ko' : '';
  var html = '';
  SHORTS.forEach(function(s,i) {
    var num = i+1, isLive = s.url && s.url.length > 10;
    var watchBtn = isLive
      ? '<a class="btn-watch" href="'+s.url+'" target="_blank" rel="noopener">'+lb.watch+'</a>'
      : '<button class="btn-watch pending">'+lb.pending+'</button>';
    var tags = s.tags.map(function(t){return '<span class="short-tag">'+escHtml(t)+'</span>';}).join('');
    html += '<div class="short-card">';
    html += '<div class="short-thumb"><div class="short-play-btn"><div class="short-play-icon">&#9654;</div></div>';
    html += '<span class="short-num">#'+num+'</span></div>';
    html += '<div class="short-body">';
    html += '<div class="short-show">'+escHtml(isKo?s.show_ko:s.show_en)+'</div>';
    html += '<div class="short-title-en">'+escHtml(s.title_en)+'</div>';
    html += '<div class="short-title-ko">'+escHtml(s.title_ko)+'</div>';
    html += '<div class="short-desc-en">'+escHtml(s.desc_en)+'</div>';
    html += '<div class="short-desc-ko">'+escHtml(s.desc_ko)+'</div>';
    html += '<div class="short-tags">'+tags+'</div>';
    html += '<div class="short-actions">'+watchBtn+'</div>';
    html += '</div></div>';
  });
  document.getElementById('shortsGrid').innerHTML = html;
}

function applyPageLang() { buildGrid(); }

window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
  buildGrid();
});
