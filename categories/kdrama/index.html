<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Drama — Live Korean</title>
  <link rel="stylesheet" href="../../css/style.css">
  <meta name="theme-color" content="#e8245c">
  <style>
    /* ── Category hero ───────────────────────────────────── */
    .cat-hero {
      background: linear-gradient(135deg, #fff0f4 0%, #ffd6e4 60%, #ffe4ee 100%);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px 24px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }
    .cat-hero-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.18;
    }
    .cat-hero-inner { position: relative; z-index: 1; }
    .cat-hero-eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .cat-hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 600;
      font-style: italic;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .cat-hero-sub {
      font-size: 0.82rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
    }
    /* ── Shorts grid ─────────────────────────────────────── */
    .shorts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }
    .short-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
    }
    .short-card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 28px rgba(232,36,92,0.13);
      transform: translateY(-2px);
    }
    .short-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #fff0f4, #ffd6e4);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .short-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .short-play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.22);
      transition: var(--transition);
    }
    .short-card:hover .short-play-btn { background: rgba(232,36,92,0.35); }
    .short-play-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .short-num {
      position: absolute;
      top: 10px; left: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }
    .short-body { padding: 14px 16px 16px; }
    .short-show {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .short-title-en {
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 2px;
    }
    .short-title-ko {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 8px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .short-desc-en, .short-desc-ko {
      font-size: 0.77rem;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 10px;
    }
    .short-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .short-tag {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 12px;
      background: var(--card2);
      color: var(--accent2);
      border: 1px solid var(--border);
      letter-spacing: 0.3px;
    }
    .short-actions {
      display: flex;
      gap: 8px;
    }
    .btn-watch {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }
    .btn-watch:hover { background: #c91d50; }
    .btn-watch.pending {
      background: var(--card2);
      color: var(--muted);
      cursor: default;
    }
    .btn-watch.pending:hover { background: var(--card2); }
    /* lang visibility */
    [data-lang] { display: none; }
    [data-lang].visible { display: block; }
    .short-title-ko, .short-desc-ko { display: none; }
    .lang-ko .short-title-en, .lang-ko .short-desc-en { display: none; }
    .lang-ko .short-title-ko, .lang-ko .short-desc-ko { display: block; }
  </style>
</head>

var HERO = {
  en: {
    eyebrow: '🎬 Category',
    title:   'K-Drama',
    sub:     'Iconic scenes, emotional moments, and unforgettable lines from the best Korean dramas — each clip paired with cultural and language context.'
  },
  ko: {
    eyebrow: '🎬 카테고리',
    title:   'K-드라마',
    sub:     '최고의 한국 드라마에서 가져온 명장면, 감동적인 순간, 잊을 수 없는 대사들 — 각 클립마다 문화적·언어적 맥락이 함께 제공됩니다.'
  }
};

var LABELS = {
  en: { section: '📺 30 Featured Shorts', watch: '▶ Watch Short', pending: '▶ Short Coming Soon' },
  ko: { section: '📺 30개 추천 쇼츠',    watch: '▶ 쇼츠 보기',  pending: '▶ 쇼츠 준비 중' }
};

function buildGrid() {
  var isKo  = getLang() === 'ko';
  var lang  = isKo ? 'ko' : 'en';
  var lbl   = LABELS[lang];
  var hero  = HERO[lang];

  document.getElementById('hero-eyebrow').textContent  = hero.eyebrow;
  document.getElementById('hero-title').textContent    = hero.title;
  document.getElementById('hero-sub').textContent      = hero.sub;
  document.getElementById('section-label').textContent = lbl.section;
  document.body.className = isKo ? 'lang-ko' : '';

  var html = '';
  SHORTS.forEach(function(s, i) {
    var num      = i + 1;
    var isLive   = s.url && s.url.length > 10;
    var watchBtn = isLive
      ? '<a class="btn-watch" href="' + s.url + '" target="_blank" rel="noopener">▶ ' + lbl.watch + '</a>'
      : '<button class="btn-watch pending">▶ ' + lbl.pending + '</button>';
    var tags = s.tags.map(function(t){ return '<span class="short-tag">' + t + '</span>'; }).join('');
    html += '<div class="short-card">';
    html += '<div class="short-thumb">';
    html += '<div class="short-play-btn"><div class="short-play-icon">▶</div></div>';
    html += '<span class="short-num">#' + num + '</span>';
    html += '</div>';
    html += '<div class="short-body">';
    html += '<div class="short-show">' + (isKo ? s.show_ko : s.show_en) + '</div>';
    html += '<div class="short-title-en">' + s.title_en + '</div>';
    html += '<div class="short-title-ko">' + s.title_ko + '</div>';
    html += '<div class="short-desc-en">'  + s.desc_en  + '</div>';
    html += '<div class="short-desc-ko">'  + s.desc_ko  + '</div>';
    html += '<div class="short-tags">' + tags + '</div>';
    html += '<div class="short-actions">' + watchBtn + '</div>';
    html += '</div></div>';
  });
  document.getElementById('shortsGrid').innerHTML = html;
}

function applyPageLang() { buildGrid(); }

window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
  buildGrid();
});
