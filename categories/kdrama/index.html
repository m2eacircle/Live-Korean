  <style>
    .cat-hero {
      background: linear-gradient(135deg,#fff0f4 0%,#ffd6e4 60%,#ffe4ee 100%);
      border:1.5px solid var(--border); border-radius:var(--radius);
      padding:28px 24px 24px; margin-bottom:32px;
      position:relative; overflow:hidden;

    .cat-hero-img { position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.18; }
    .cat-hero-inner { position:relative;z-index:1; }
    .cat-hero-eyebrow { font-size:0.72rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#e8245c;margin-bottom:6px; }

    .short-card { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--transition); }

    .short-thumb { width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#fff0f4 0%,#ffd6e4 60%,#ffe4ee 100%);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center; }
    .short-play-btn { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.22);transition:var(--transition); }

    .short-num { position:absolute;top:10px;left:10px;background:#e8245c;color:#fff;font-size:0.65rem;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:0.3px; }
    .short-body { padding:14px 16px 16px; }
    .short-show { font-size:0.68rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#e8245c;margin-bottom:4px; }
    .short-title-en { font-family:'Syne',sans-serif;font-size:0.88rem;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:2px; }
    .short-title-ko { font-size:0.82rem;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:8px;font-family:'Noto Sans KR',sans-serif;display:none; }
    .short-desc-en, .short-desc-ko { font-size:0.77rem;color:var(--muted);line-height:1.55;margin-bottom:10px; }
    .short-desc-ko { display:none; }
    .lang-ko .short-title-en, .lang-ko .short-desc-en { display:none; }
    .lang-ko .short-title-ko, .lang-ko .short-desc-ko { display:block; }
    .short-tags { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px; }
    .short-tag { font-size:0.65rem;font-weight:600;padding:3px 9px;border-radius:12px;background:var(--card2);color:var(--accent2);border:1px solid var(--border); }
    .short-actions { display:flex;gap:8px; }
    .btn-watch { flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:#e8245c;color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 14px;font-size:0.78rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:var(--transition);text-decoration:none; }
    .btn-watch:hover { opacity:0.88; }
    .btn-watch.pending { background:var(--card2);color:var(--muted);cursor:default; }
    .btn-watch.pending:hover { background:var(--card2); }
  </style>

    title_en:'Why Koreans Bow So Much in K-Dramas', title_ko:'K-드라마에서 한국인이 자주 절하는 이유',
    desc_en:'Bowing in Korea is not just politeness — it is a physical expression of the Confucian social hierarchy. The depth and duration of a bow communicates exactly how much respect is owed. A 15° nod is casual; a 45° bow signals deep respect; a 90° bow is an apology or extreme gratitude. In dramas, bowing appears constantly because hierarchy is always present.',
    desc_ko:'한국에서 절은 단순한 예의가 아니라 유교적 사회 계층 전체를 몸으로 표현하는 방식입니다. 절의 각도와 길이가 존경의 정도를 정확하게 전달합니다. 15도는 가벼운 인사, 45도는 깊은 존경, 90도는 사과나 극한의 감사를 의미합니다.',
    tags:['절','Confucianism','hierarchy','body language'], url:''

  {
    show_en:'Korean Culture', show_ko:'한국 문화',
    title_en:'Why K-Dramas Avoid Kissing Early', title_ko:'K-드라마에서 초반에 키스를 피하는 이유',
    desc_en:'Korean romantic culture places enormous value on 설레임 (heart-fluttering anticipation). Public displays of affection have historically been taboo, so every near-miss and prolonged eye contact carries the emotional weight that a kiss would carry elsewhere. The slow burn mirrors real Korean romantic culture where restraint is considered beautiful.',
    desc_ko:'한국 연애 문화는 설레임(두근거리는 기대감)을 매우 중요하게 여깁니다. 공개적인 애정 표현은 역사적으로 금기였기 때문에, 스치는 손길과 긴 눈맞춤 하나하나가 다른 나라의 키스만큼의 감정을 담습니다.',
    tags:['설레임','romance','dating culture','restraint'], url:''
  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',
    title_en:'Why Koreans Don\'t Call Elders by Name', title_ko:'한국인이 어른을 이름으로 부르지 않는 이유',
    desc_en:'In Korean culture, calling someone older by their given name is deeply rude. Instead, Koreans use relationship titles: 선생님, 사장님, 언니, 오빠, 누나, 형. Even strangers get titles: 아저씨 or 아줌마. This system encodes every social relationship into the act of address itself.',
    desc_ko:'한국 문화에서 연상을 이름으로 부르는 것은 매우 무례한 행동입니다. 대신 한국인은 선생님·사장님·언니·오빠·누나·형 같은 관계 호칭을 씁니다. 낯선 사람에게도 아저씨·아줌마를 씁니다.',
    tags:['honorifics','address terms','age culture','선생님'], url:''
  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',
    title_en:'Why Drinking Scenes Are Everywhere in K-Dramas', title_ko:'K-드라마에 음주 장면이 넘쳐나는 이유',
    desc_en:'Drinking in Korea is a deeply social ritual. 회식 (company dinner with drinking) is almost mandatory. Koreans pour drinks for each other, never for themselves — pouring your own drink is considered rude. Scenes of pouring and receiving reveal real relationship dynamics between characters.',
    desc_ko:'한국에서 음주는 깊은 사회적 의식입니다. 회식은 한국 직장에서 거의 필수적입니다. 한국인은 서로의 잔을 채워주며 자신의 잔은 직접 채우지 않습니다. 술을 따르고 받는 장면이 인물 간의 실제 관계 역학을 드러냅니다.',
    tags:['소주','회식','drinking culture','social ritual'], url:''
  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',

    desc_en:'Korean workplace culture is shaped by 위계질서 (hierarchical order) inherited from Confucianism and military service. Titles like 대리, 과장, and 부장 are used constantly instead of names. Leaving before your boss is considered disrespectful — a sensitivity called 눈치 보기. This is why Korean office dramas feel like battlefields.',
    desc_ko:'한국의 직장 문화는 유교와 군 복무에서 이어받은 위계질서로 형성됩니다. 이름 대신 대리·과장·부장 같은 직함을 끊임없이 씁니다. 상사보다 먼저 퇴근하는 것은 눈치 없는 행동으로 여겨집니다.',
    tags:['위계질서','직함','workplace','눈치'], url:''

  {

    desc_en:'Korean communication culture prizes 눈치 (reading unspoken feelings) over direct speech. What is not said carries as much weight as what is said. When a Korean drama character goes silent, the audience understands this is the most intense emotional moment — the character feels too much to speak. Koreans call this 침묵의 무게 (the weight of silence).',
    desc_ko:'한국의 소통 문화는 직접적인 말보다 눈치(말하지 않은 감정을 읽기)를 중시합니다. 말하지 않는 것이 말하는 것만큼 무게를 가집니다. K-드라마 인물이 침묵할 때, 그것이 가장 강렬한 감정의 순간임을 시청자는 압니다.',
    tags:['침묵','눈치','indirect communication','emotion'], url:''

  {

    desc_en:'첫사랑 (first love) holds a mythical status in Korean culture. The belief that first love is the purest — before the world hardens you — is deeply embedded. Korean has specific words for love nostalgia: 그립다 (to long for something that may not return) and 추억 (sweet memories of the past).',
    desc_ko:'첫사랑은 한국 문화에서 신화적 지위를 가집니다. 세상에 물들기 전의 첫사랑이 가장 순수하다는 믿음이 깊이 내재돼 있습니다. 한국어에는 그립다, 추억 같은 사랑의 그리움을 표현하는 특정 단어가 있습니다.',
    tags:['첫사랑','그립다','추억','nostalgia'], url:''

  {

    desc_en:'Directly refusing a request in Korean can damage relationships. Instead, Koreans soften refusals with phrases like 좀 어려울 것 같아요 (it might be a little difficult) or 글쎄요 (well, hmm). In K-dramas, Korean audiences understand these phrases mean no — non-Korean viewers often miss this layer entirely.',
    desc_ko:'한국어로 직접 거절하면 관계가 손상될 수 있습니다. 대신 \'좀 어려울 것 같아요\', \'글쎄요\' 같은 표현으로 거절을 부드럽게 합니다. K-드라마에서 한국 시청자는 이 말들이 거절임을 압니다.',
    tags:['indirect refusal','글쎄요','face-saving','communication'], url:''

  {
    show_en:'Korean Culture', show_ko:'한국 문화',
    title_en:'Why Umbrella Scenes Are So Romantic', title_ko:'우산 장면이 그토록 낭만적인 이유',
    desc_en:'Rain in Korea is deeply associated with 감성 (emotional sensitivity). Sharing an umbrella forces physical closeness in a culture where public touch is rare — making it powerfully romantic without any explicit gesture. The phrase 우산 씌워줄게 (I\'ll hold the umbrella for you) is an act of protection and care.',
    desc_ko:'한국에서 비는 감성(감정적 예민함)과 깊이 연결됩니다. 우산을 함께 쓰는 것은 공개적인 신체 접촉이 드문 문화에서 물리적 친밀감을 강제합니다. \'우산 씌워줄게\'는 보호와 배려의 행위입니다.',
    tags:['우산','감성','rain','romance'], url:''
  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',

    desc_en:'The 고백 (confession of feelings) in Korean culture is a formal, momentous act. Unlike casual flirting, a Korean 고백 is a deliberate declaration that changes the relationship permanently. The phrase 사귀어 주세요 (please go out with me) is treated with great weight. This is why rejection in dramas causes such devastation.',
    desc_ko:'한국 문화에서 고백은 공식적이고 중대한 행위입니다. 캐주얼한 플러팅과 달리, 한국의 고백은 관계를 영구적으로 바꾸는 의도적 선언입니다. \'사귀어 주세요\'는 큰 무게로 다뤄집니다.',
    tags:['고백','confession','사귀어 주세요','romance ritual'], url:''

    desc_en:'In Korea, marriage is considered a union of families, not just individuals. Meeting the parents is a serious step, and parental approval can make or break a relationship. The concept of 집안 (family background/lineage) still carries weight. Dramas exaggerate this but the core reality is genuine.',
    desc_ko:'한국에서 결혼은 개인이 아닌 가문의 결합으로 여겨집니다. 부모님께 인사드리는 것은 중요한 단계이며, 집안(가족 배경·혈통) 개념이 여전히 중요합니다.',
    tags:['부모님','집안','marriage culture','family approval'], url:''
  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',
    title_en:'Why School Dramas Are So Intense', title_ko:'학원 드라마가 그토록 치열한 이유',
    desc_en:'Korea\'s education system is one of the most competitive in the world. The 수능 (college entrance exam) is held once a year — on exam day, flights are even grounded to reduce noise. 학원 (private tutoring academies) are a multi-billion dollar industry. School dramas reflect real national anxiety about academic performance.',
    desc_ko:'한국의 교육 시스템은 세계에서 가장 경쟁적입니다. 수능은 연 1회 시행되며 소음을 줄이기 위해 비행기까지 통제됩니다. 학원은 수십억 달러 규모의 산업입니다.',
    tags:['수능','학원','education culture','competition'], url:''
  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',
    title_en:'Why Karaoke Is Such an Emotional Experience', title_ko:'노래방이 그토록 감정적인 경험인 이유',
    desc_en:'Korean 노래방 is a private room rented by the hour — unlike public karaoke. This privacy creates a space where Koreans can express emotions they would never show otherwise. A character going to 노래방 alone in a drama is usually in emotional crisis. It is Korea\'s emotional pressure valve.',
    desc_ko:'한국의 노래방은 시간제로 대여하는 독립된 공간입니다. 이 사적인 공간은 평소에 드러내지 않을 감정을 표현할 수 있는 장소를 만들어줍니다. 드라마에서 혼자 노래방 가는 장면은 감정적 위기를 의미합니다.',
    tags:['노래방','emotional release','private space','culture'], url:''
  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',

    desc_en:'Korean culture places enormous pride in food. The practice of 먹방 (eating broadcast) became a global phenomenon because Koreans have an unusually intense relationship with eating. In dramas, sharing food is an intimacy ritual. \'밥 먹었어?\' (Did you eat?) is how Koreans say \'I care about you.\'',
    desc_ko:'한국 문화는 음식에 큰 자부심을 가집니다. 먹방이 세계적 현상이 된 것은 한국인이 식사에 대해 유난히 강렬한 관계를 가지기 때문입니다. \'밥 먹었어?\'는 한국인이 \'당신을 아낀다\'고 말하는 방식입니다.',

  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',

    desc_en:'Korean has two distinct speech systems: 존댓말 (respectful speech) and 반말 (casual speech). Using the wrong level signals you don\'t understand the relationship. The moment two people switch to banmal in a drama is always a significant relationship milestone — always watch for it.',
    desc_ko:'한국어에는 두 가지 말하기 체계가 있습니다: 존댓말과 반말. 잘못된 말투는 관계를 이해하지 못함을 드러냅니다. 드라마에서 두 사람이 반말로 바꾸는 순간은 중요한 관계 이정표입니다.',
    tags:['존댓말','반말','speech levels','relationship milestone'], url:''
  },
  {
    show_en:'Korean Culture', show_ko:'한국 문화',
    title_en:'Why Korean Friendships Are So Deep', title_ko:'한국의 우정이 그토록 깊은 이유',
    desc_en:'The concept of 의리 (loyalty, doing right by your people) makes Korean friendship more intense than in many cultures. A Korean best friend (절친) is expected to show up at 3am, give honest harsh feedback, and share meals without accounting. The word 우리 — used even for \'my own mother\' (우리 엄마) — shows how collective Korean bonds truly are.',
    desc_ko:'의리(자기 사람을 위해 올바르게 행동하기) 개념이 한국의 우정을 강렬하게 만듭니다. 절친은 새벽 3시에도 달려오고 솔직한 쓴소리를 해줍니다. \'우리 엄마\'처럼 쓰는 \'우리\'는 한국 유대가 얼마나 집단적인지 보여줍니다.',
    tags:['의리','절친','우리','friendship culture'], url:''

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildGrid() {
  var isKo = getLang()==='ko', lang = isKo?'ko':'en';
  var h = HERO[lang], lb = LABELS[lang];
  document.getElementById('hero-eyebrow').textContent  = h.eyebrow;
  document.getElementById('hero-title').textContent    = h.title;
  document.getElementById('hero-sub').textContent      = h.sub;
  document.getElementById('section-label').textContent = lb.section;
  document.body.className = isKo ? 'lang-ko' : '';
  var html = '';
  SHORTS.forEach(function(s,i) {
    var num = i+1, isLive = s.url && s.url.length > 10;
    var watchBtn = isLive
      ? '<a class="btn-watch" href="'+s.url+'" target="_blank" rel="noopener">'+lb.watch+'</a>'
      : '<button class="btn-watch pending">'+lb.pending+'</button>';
    var tags = s.tags.map(function(t){return '<span class="short-tag">'+escHtml(t)+'</span>';}).join('');
    html += '<div class="short-card">';
    html += '<div class="short-thumb"><div class="short-play-btn"><div class="short-play-icon">&#9654;</div></div>';
    html += '<span class="short-num">#'+num+'</span></div>';
    html += '<div class="short-body">';
    html += '<div class="short-show">'+escHtml(isKo?s.show_ko:s.show_en)+'</div>';
    html += '<div class="short-title-en">'+escHtml(s.title_en)+'</div>';
    html += '<div class="short-title-ko">'+escHtml(s.title_ko)+'</div>';
    html += '<div class="short-desc-en">'+escHtml(s.desc_en)+'</div>';
    html += '<div class="short-desc-ko">'+escHtml(s.desc_ko)+'</div>';
    html += '<div class="short-tags">'+tags+'</div>';
    html += '<div class="short-actions">'+watchBtn+'</div>';
    html += '</div></div>';
  });
  document.getElementById('shortsGrid').innerHTML = html;
}

function applyPageLang() { buildGrid(); }

window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
  buildGrid();
});
