<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian Shorts &mdash; Live Korean</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .shorts-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }
    .short-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden;
      cursor: pointer; transition: var(--transition); text-decoration: none;
      box-shadow: 0 1px 6px rgba(124,58,237,0.05);
    }
    .short-row:hover { border-color: var(--accent); transform: translateX(4px); box-shadow: 0 4px 16px rgba(232,36,92,0.13); }
    .short-row-img {
      width: 90px; min-width: 90px; height: 68px;
      object-fit: cover; display: block;
    }
    .short-row-img-placeholder {
      width: 90px; min-width: 90px; height: 68px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--card2), var(--card3));
      flex-shrink: 0;
    }
    .short-row-body { flex: 1; padding: 10px 12px 10px 0; min-width: 0; }
    .short-row-num {
      font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--accent2); margin-bottom: 3px;
    }
    .short-row-title {
      font-size: 0.88rem; font-weight: 700; color: var(--text);
      line-height: 1.35; margin-bottom: 3px;
    }
    .short-row-title-ko {
      font-size: 0.84rem; font-weight: 700; color: var(--text);
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      word-break: keep-all; line-height: 1.35; margin-bottom: 3px;
    }
    .short-row-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 700; color: var(--accent);
      background: rgba(232,36,92,0.07); border: 1px solid rgba(232,36,92,0.18);
      border-radius: 20px; padding: 2px 8px;
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <button class="btn-topbar-home" onclick="goHome()" title="Home">&#127968;</button>
    <div class="topbar-logo">
      <span class="logo-live">Live</span>
      <div class="logo-dot"></div>
      <span class="logo-korea">Korean</span>
    </div>
  </div>
  <div class="topbar-right" id="topbar-lang-wrap"></div>
</header>

<main>
<div class="page-wrap">

  <nav class="nav-row">

  </nav>

  <nav class="breadcrumb">
    <a href="../../index.html">Live Korean</a>

    <a href="index.html" id="bc-drama">Guardian</a>
    <span class="sep">&#8250;</span>
    <span class="current" id="bc-shorts">YouTube Shorts</span>
  </nav>

  <div class="page-header">
    <div class="page-header-thumb">
      <img src="../../images/guardian.jpg" alt="Guardian"
        onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#ede9fe,#c4b8e8)';this.parentElement.innerHTML='&#127754;';">
    </div>
    <div class="page-header-info">
      <div class="page-header-title" id="hdr-title">Guardian &mdash; YouTube Shorts</div>
      <div class="page-header-meta" id="hdr-meta">24 Stories &middot; Did You Know?</div>
    </div>
  </div>

  <div class="bookmark-bar" id="bookmarkBar">
    <div class="bookmark-bar-head"><span class="bm-icon">&#128278;</span><span id="bm-bar-title">Your Bookmarks</span></div>
    <div class="bookmark-chips" id="bookmarkChips"></div>
  </div>

  <div class="section-label" id="section-label">&#127381; 24 YouTube Shorts &mdash; Guardian</div>
  <div class="shorts-list" id="shortsList"></div>

</div>
</main>

</footer>

<script src="../../js/app.js"></script>

    { num:  1, titleEn: 'Road Sign Anachronism in Episode 1',           titleKo: '1화 도로명표지판 오류',                  img: 'images/ep1.jpg',  emoji: '&#127381;' },

    { num:  5, titleEn: "Ji Eun-tak's School Filming Locations",        titleKo: '지은탁 학교 촬영지',                    img: 'images/ep5.jpg',  emoji: '&#127979;' },
    { num:  6, titleEn: 'Did the Secretary Reincarnate as the Villain?',titleKo: '김 비서와 간신, 환생한 걸까?',          img: 'images/ep6.jpg',  emoji: '&#128064;' },
    { num:  7, titleEn: 'The Hierarchy of Divine Beings',               titleKo: '도깨비 세계관의 신격 존재들',           img: 'images/ep7.jpg',  emoji: '&#10024;' },
    { num:  8, titleEn: 'Taiwanese Fans Won the Lottery!',              titleKo: '대만 팬이 도깨비 복권에 당첨!',         img: 'images/ep8.jpg',  emoji: '&#127920;' },
    { num:  9, titleEn: "Gong Yoo's Casting Took 5 Years",              titleKo: '공유 캐스팅에 5년이 걸린 이유',         img: 'images/ep9.jpg',  emoji: '&#9203;'  },
    { num: 10, titleEn: 'Why the Phone Changed Mid-Drama',              titleKo: '갤럭시 노트7에서 S7으로 바뀐 이유',     img: 'images/ep10.jpg', emoji: '&#128241;' },
    { num: 11, titleEn: 'Even Quebec Locals Know Goblin',               titleKo: '퀘벡 현지인도 도깨비를 안다',           img: 'images/ep11.jpg', emoji: '&#127981;' },
    { num: 12, titleEn: 'Fashion Codes of the Main Characters',         titleKo: '주인공들의 패션 코드',                  img: 'images/ep12.jpg', emoji: '&#128084;' },
    { num: 13, titleEn: 'What the Male Leads Have in Common',           titleKo: '주연 남자 배우들의 공통점',             img: 'images/ep13.jpg', emoji: '&#127917;' },
    { num: 14, titleEn: 'Goblin Inspired the Film Suzume',              titleKo: '스즈메의 문단속에 영감을 준 도깨비',    img: 'images/ep14.jpg', emoji: '&#128682;' },
    { num: 15, titleEn: "Gong Yoo &amp; Lee Dong-wook's Improvisations",titleKo: '공유와 이동욱의 즉흥 연기',             img: 'images/ep15.jpg', emoji: '&#127908;' },
    { num: 16, titleEn: "The 'Guardian' vs 'Goblin' Translation Debate",titleKo: '도깨비 vs 고블린 번역 논란',            img: 'images/ep16.jpg', emoji: '&#127760;' },
    { num: 17, titleEn: 'Characters Reunited Across Lifetimes',         titleKo: '전생의 인연으로 다시 만나는 인물들',    img: 'images/ep1.jpg',  emoji: '&#9854;'  },
    { num: 18, titleEn: 'Supporting Actors Who Became Stars',           titleKo: '조연·단역에서 주연으로 성장한 배우들', img: 'images/ep2.jpg',  emoji: '&#11088;' },
    { num: 19, titleEn: 'The Actors Watch Their Own Works in the Drama',titleKo: '극중 영화와 드라마 속 본인 출연!',      img: 'images/ep3.jpg',  emoji: '&#127916;' },
    { num: 20, titleEn: 'Lee Dong-wook Chased the Writer onto a Plane', titleKo: '이동욱이 비행기까지 타고 쫓아간 캐스팅',img: 'images/ep4.jpg',  emoji: '&#9992;'  },
    { num: 21, titleEn: "The Double Meaning of Ordering 'Heaven'",      titleKo: '천국 주문의 중의적 의미',               img: 'images/ep5.jpg',  emoji: '&#128174;' },
    { num: 22, titleEn: 'Is Yeonhee University Actually Yonsei?',       titleKo: '연희대학교는 연세대학교?',              img: 'images/ep6.jpg',  emoji: '&#127979;' },
    { num: 23, titleEn: "Ji Eun-tak's Uniform is the Actress's Real School Uniform", titleKo: '지은탁의 교복은 실제 배우의 모교 교복', img: 'images/ep7.jpg', emoji: '&#128084;' },
    { num: 24, titleEn: 'Reality vs Drama at the Essay Exam Location',  titleKo: '논술 시험장 촬영의 현실과 드라마 차이', img: 'images/ep8.jpg',  emoji: '&#128221;' }
  ];

  function goHome() { window.location.href = '../../index.html'; }

  function applyPageLang() {
    var isKo = getLang() === 'ko';
    document.documentElement.lang = isKo ? 'ko' : 'en';
    document.getElementById('nav-home').textContent     = isKo ? '홈' : 'Home';
    document.getElementById('nav-back').textContent     = isKo ? '도깨비로' : 'Back to Guardian';
    document.getElementById('bc-drama').textContent     = isKo ? '도깨비' : 'Guardian';
    document.getElementById('bc-shorts').textContent    = isKo ? '유튜브 쇼츠' : 'YouTube Shorts';
    document.getElementById('hdr-title').textContent    = isKo ? '도깨비 \u2014 유튜브 쇼츠' : 'Guardian \u2014 YouTube Shorts';
    document.getElementById('hdr-meta').textContent     = isKo ? '스토리 24개 · 알고 계셨나요?' : '24 Stories \u00b7 Did You Know?';
    document.getElementById('bm-bar-title').textContent = isKo ? '북마크' : 'Your Bookmarks';
    document.getElementById('section-label').innerHTML  = isKo
      ? '&#127381; 유튜브 쇼츠 24개 &mdash; 도깨비'
      : '&#127381; 24 YouTube Shorts &mdash; Guardian';
    buildList();
  }

  function buildList() {
    var isKo = getLang() === 'ko';
    var list = document.getElementById('shortsList');
    if (!list) return;
    list.innerHTML = '';

    SHORTS.forEach(function(s) {
      var a = document.createElement('a');
      a.className = 'short-row';
      a.href = 'shorts/short' + s.num + '.html';

      // Image
      var img = document.createElement('img');
      img.className = 'short-row-img';
      img.alt = isKo ? s.titleKo : s.titleEn;
      img.src = s.img;
      img.onerror = (function(emoji, el) {
        return function() {
          var ph = document.createElement('div');
          ph.className = 'short-row-img-placeholder';
          ph.innerHTML = emoji;
          el.parentNode.replaceChild(ph, el);
        };
      })(s.emoji, img);
      a.appendChild(img);

      // Body
      var body = document.createElement('div');
      body.className = 'short-row-body';
      body.innerHTML =
        '<div class="short-row-num">&#127381; Story ' + s.num + ' / 24</div>'
        + '<div class="' + (isKo ? 'short-row-title-ko' : 'short-row-title') + '">'
        + (isKo ? s.titleKo : s.titleEn) + '</div>'
        + '<span class="short-row-badge">&#9654; YouTube Short</span>';
      a.appendChild(body);

      list.appendChild(a);
    });
  }

  window.addEventListener('DOMContentLoaded', function() {
    if (!hasAgreed()) { window.location.href = '../../index.html'; return; }
    injectTermsModal();
    document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
    applyPageLang();
    applyLang();
    renderBookmarkBar();
    syncBookmarkButtons();
  });

</script>
</body>
</html>
