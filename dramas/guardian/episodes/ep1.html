var EP_DATA = {
  available: true,
  titleEn: 'Guardian: The Lonely and Great God — Episode 1',
  titleKo: '쓸쓸하고 찬란하神 – 도깨비 1화',
  expressions: [
    {
      korean: '살려주세요',
      romanization: 'Saryeo juseyo',
      english: 'Please save me / Help me',
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 00:38 — Eun-tak\'s mother is lying in a pool of blood in a snowy parking lot after a hit-and-run. She pleads desperately: "살려주세요." Kim Shin, watching from a distance, hears her cry and intervenes.',
      tvn_ko: 'tvN 약 00:38 — 지은탁의 어머니가 주차장에서 뺑소니를 당한 채 피를 흘리며 쓰러져 있는 장면. "살려주세요"라고 애원하자 멀리서 지켜보던 김신이 개입합니다.',
      meaning: 'A desperate plea literally meaning "please save my life." Used only in life-threatening emergencies — far stronger than 도와주세요 (please help me). The urgency in the voice is everything.',
      meaning_ko: '문자 그대로 "제 목숨을 살려주세요"라는 절박한 호소입니다. 생명이 위협받는 응급 상황에서만 쓰며, "도와주세요"보다 훨씬 강렬하고 절박한 표현입니다.',
      example: 'A: "Someone call an ambulance!" B: "살려주세요! I can\'t breathe!"',
      example_ko: 'A: "누가 구급차 좀 불러요!" B: "살려주세요! 숨을 못 쉬겠어요!"',
      youtubeUrl: ''
    },
    {
      korean: '괜찮아요',
      romanization: 'Gwaenchanayo',
      english: "It's okay / I'm fine",
      partOfSpeech: 'expression',
      tvn: "tvN approx. 01:02 — After Kim Shin saves Eun-tak's pregnant mother, she regains consciousness in her pool of blood, gasping. When Kim Shin kneels beside her she instinctively says '괜찮아요' — a reflex even in her broken state.",
      tvn_ko: 'tvN 약 01:02 — 김신이 지은탁의 어머니를 살린 직후, 의식을 되찾은 그녀가 반사적으로 "괜찮아요"라고 말하는 장면입니다.',
      meaning: 'Korean\'s most versatile expression. Means "I\'m okay," "it\'s alright," or even "no thank you." Tone decides everything — gentle is reassuring, flat means "drop it."',
      meaning_ko: '"괜찮아요"는 한국어에서 가장 다재다능한 표현입니다. 내가 괜찮다는 뜻도, 상대를 안심시키는 말도, 때로는 제안을 거절하는 말도 됩니다. 톤이 의미를 결정합니다.',
      example: 'A: "Are you hurt?" B: "괜찮아요. Just a scratch."',
      example_ko: 'A: "다쳤어요?" B: "괜찮아요. 긁힌 것뿐이에요."',
      youtubeUrl: ''
    },
    {
      korean: '죽고 싶소?',
      romanization: 'Jukgo sipso?',
      english: 'Do you want to die?',
      partOfSpeech: 'expression',
      tvn: "tvN approx. 07:20 — Goryeo era. General Kim Shin confronts the corrupt palace advisor who conspired to have him killed. Standing over him, Kim Shin says coldly: '죽고 싶소?' — not really a question, but a warning.",
      tvn_ko: 'tvN 약 07:20 — 고려 시대. 김신을 역모로 몰아 죽이려 한 간신 박중헌 앞에서 김신이 차갑게 "죽고 싶소?"라고 묻는 장면. 질문이 아닌 경고입니다.',
      meaning: '"죽다" = to die, "~고 싶다" = to want to ~, "~소?" is a formal archaic question ending. This old-fashioned form is used in historical dramas. Modern equivalent: "죽고 싶어요?" Carries a cold, threatening tone.',
      meaning_ko: '"죽다"는 죽다, "~고 싶다"는 원하다, "~소?"는 고어체 의문형입니다. 사극에서 자주 쓰이며, 현대어로는 "죽고 싶어요?"에 해당합니다. 차갑고 위협적인 어감을 가집니다.',
      example: 'A: (recklessly crossing a busy road) B: "죽고 싶소? 차 오는 거 안 보여요?"',
      example_ko: 'A: (차가 쌩쌩 달리는 도로를 무단횡단) B: "죽고 싶소? 차 오는 거 안 보여요?"',
      youtubeUrl: ''
    },
    {
      korean: '두렵지 않소?',
      romanization: 'Duryeopji anhso?',
      english: "Aren't you afraid?",
      partOfSpeech: 'expression',
      tvn: "tvN approx. 09:45 — Goryeo era. Kim Shin walks alone toward the young king's chamber. A soldier blocks his way and asks: '두렵지 않소?' Kim Shin answers with silence and a steady gaze — he has nothing left to fear.",
      tvn_ko: 'tvN 약 09:45 — 고려 시대. 혼자 왕의 침실로 걸어가는 김신 앞을 막아선 병사가 묻습니다. "두렵지 않소?" 김신은 말없이 시선으로 답합니다. 두려울 것이 없는 사람의 눈빛입니다.',
      meaning: '"두렵다" = to be afraid, "~지 않다" = is not ~, "~소?" = archaic question ending. Used in sageuk (historical dramas) to convey dignified confrontation. Modern form: "두렵지 않아요?"',
      meaning_ko: '"두렵다"는 두렵다, "~지 않다"는 부정, "~소?"는 고어 의문형입니다. 현대어로는 "두렵지 않아요?"에 해당하며, 사극에서 품격 있는 대립 장면에 자주 쓰입니다.',
      example: 'A: "You\'re about to go bungee jumping for the first time." B: "두렵지 않아요? Your hands are shaking."',
      example_ko: 'A: "처음으로 번지점프 하려고 하잖아요." B: "두렵지 않아요? 손이 떨리는데요."',
      youtubeUrl: ''
    },
    {
      korean: '이게 무슨 짓이오?',
      romanization: 'Ige museun jitiyo?',
      english: 'What is the meaning of this? / What have you done?',
      partOfSpeech: 'expression',
      tvn: "tvN approx. 12:10 — Goryeo era. General Kim Shin returns victorious from battle only to find palace archers aiming at his men. He demands furiously: '이게 무슨 짓이오?' The king\'s betrayal is revealed in that moment.",
      tvn_ko: 'tvN 약 12:10 — 고려 시대. 전쟁에서 승리하고 귀환한 김신 장군이 자신의 병사들을 향해 활을 겨누는 궁수들을 발견하고 분노하며 외칩니다. "이게 무슨 짓이오?" 왕의 배신이 드러나는 순간입니다.',
      meaning: '"이게" = this, "무슨" = what kind of, "짓" = act/deed (often negative), "이오?" = archaic "is this?". Expresses outrage at someone\'s shocking or unacceptable action. Modern: "이게 무슨 짓이에요?"',
      meaning_ko: '"이게"는 이것이, "무슨 짓"은 어떤 행동(주로 나쁜), "이오?"는 고어 "이에요?". 충격적이거나 용납할 수 없는 행동에 분노를 표현합니다. 현대어: "이게 무슨 짓이에요?"',
      example: 'A: (finds the living room completely rearranged) "이게 무슨 짓이에요? Who touched everything?"',
      example_ko: 'A: (거실이 완전히 바뀐 것을 발견하고) "이게 무슨 짓이에요? 누가 다 옮긴 거예요?"',
      youtubeUrl: ''
    },
    {
      korean: '저는 괜찮습니다',
      romanization: 'Jeoneun gwaenchanseumnida',
      english: "I am fine (formal)",
      partOfSpeech: 'expression',
      tvn: "tvN approx. 14:30 — Goryeo era. The Queen (Kim Shin\'s sister-in-law) is held at sword-point. Kim Shin rushes toward her, face stricken. She meets his eyes calmly and says: '저는 괜찮습니다' — insisting he save himself, not her.",
      tvn_ko: 'tvN 약 14:30 — 고려 시대. 칼날 앞에 선 왕비가 달려오는 김신을 바라보며 차분히 말합니다. "저는 괜찮습니다." 자신보다 그가 살아야 한다는 뜻을 담은 말입니다.',
      meaning: 'The highly formal version of 괜찮아요. "저는" (formal I) + "괜찮습니다" (formal polite). Used in formal or dramatic situations. In everyday speech, "저는 괜찮아요" is more natural.',
      meaning_ko: '"괜찮아요"의 격식체입니다. "저는"(격식체 1인칭) + "괜찮습니다"(합쇼체). 공식적이거나 극적인 상황에 씁니다. 일상에서는 "저는 괜찮아요"가 더 자연스럽습니다.',
      example: 'A: "You look exhausted. Are you alright?" B: "저는 괜찮습니다. Please don\'t worry."',
      example_ko: 'A: "많이 지쳐 보이세요. 괜찮으세요?" B: "저는 괜찮습니다. 걱정 마세요."',
      youtubeUrl: ''
    },
    {
      korean: '감사합니다',
      romanization: 'Gamsahamnida',
      english: 'Thank you (formal)',
      partOfSpeech: 'expression',
      tvn: "tvN approx. 38:50 — Present day. Young Ji Eun-tak finds her mother\'s ghost waiting for her with a birthday cake. After their tearful goodbye, Eun-tak whispers: '감사합니다' — thanking her mother for every year she\'s been alive.",
      tvn_ko: 'tvN 약 38:50 — 현재. 지은탁이 엄마의 귀신이 미리 준비해 놓은 생일 케이크를 발견하는 장면. 눈물로 작별을 나눈 뒤 지은탁이 "감사합니다"라고 속삭입니다.',
      meaning: 'The formal, respectful "thank you." Use with elders, strangers, or in professional settings. More polite than 고마워요. One of the first words every Korean learner encounters.',
      meaning_ko: '격식 있고 정중한 감사 표현입니다. 어른, 낯선 사람, 직장 상황에서 씁니다. "고마워요"보다 더 공손하며, 한국어 학습자가 가장 먼저 배우는 표현 중 하나입니다.',
      example: 'A: "Here is your coffee." B: "감사합니다."',
      example_ko: 'A: "커피 나왔습니다." B: "감사합니다."',
      youtubeUrl: ''
    },
    {
      korean: '왜 울어?',
      romanization: 'Wae ureo?',
      english: 'Why are you crying?',
      partOfSpeech: 'expression',
      tvn: "tvN approx. 40:15 — Eight-year-old Eun-tak is sobbing after her mother\'s ghost vanishes. A neighbourhood child squats down next to her and asks simply: '왜 울어?' The innocence of the question makes the scene more heartbreaking.",
      tvn_ko: 'tvN 약 40:15 — 여덟 살 지은탁이 엄마의 혼이 사라진 후 울고 있을 때, 옆집 아이가 쭈그리고 앉아 "왜 울어?"라고 묻는 장면. 그 질문의 순수함이 장면을 더 애잔하게 만듭니다.',
      meaning: '"왜" = why, "울어?" = are you crying? (casual). Very direct and informal — only used between close friends, children, or those significantly younger. Polite form: "왜 울어요?" or "왜 우세요?"',
      meaning_ko: '"왜"는 왜, "울어?"는 "울다"의 반말 의문형입니다. 친한 친구, 어린이, 또는 명백히 아랫사람에게만 씁니다. 공손한 표현: "왜 울어요?" 또는 "왜 우세요?"',
      example: 'A: (sees their friend wiping tears) "왜 울어? Did something happen?"',
      example_ko: 'A: (친구가 눈물을 닦는 것을 보며) "왜 울어? 무슨 일 있어?"',
      youtubeUrl: ''
    },
    {
      korean: '아직 살아있었어?',
      romanization: 'Ajik saraiteo?',
      english: 'You were still alive?',
      partOfSpeech: 'expression',
      tvn: "tvN approx. 43:00 — Kim Shin in a wheat field, narrating his long solitary existence: centuries of watching people he knows die while he continues. He encounters an old man who once served him and murmurs in disbelief: '아직 살아있었어?'",
      tvn_ko: 'tvN 약 43:00 — 밀밭을 걷는 김신이 수백 년을 살며 모든 이의 죽음을 지켜봐야 했던 시간을 독백하는 장면. 예전 하인의 노인 버전을 만나 "아직 살아있었어?"라고 중얼거립니다.',
      meaning: '"아직" = still/yet, "살아있다" = to be alive, "~었어?" = casual past question. Used to express surprised that someone is still alive. Adding "아직" implies it\'s longer than expected.',
      meaning_ko: '"아직"은 아직/여전히, "살아있다"는 살다, "~었어?"는 반말 과거 의문형입니다. 상대가 아직 살아 있다는 것에 놀라움을 표현합니다. "아직"을 붙이면 예상보다 오래됐다는 뉘앙스가 생깁니다.',
      example: 'A: "My grandfather\'s old cactus is still alive!" B: "아직 살아있었어? It must be 20 years old."',
      example_ko: 'A: "할아버지 오래된 선인장이 아직 살아있어!" B: "아직 살아있었어? 20년은 됐겠다."',
      youtubeUrl: ''
    },
    {
      korean: '나는 도깨비다',
      romanization: 'Naneun dokkaebida',
      english: 'I am the Goblin',
      partOfSpeech: 'expression',
      tvn: "tvN approx. 48:20 — High school present day. Kim Shin appears in front of 19-year-old Eun-tak for the first time. She stares at him, startled. He says simply and quietly: '나는 도깨비다.' Matter-of-fact. Ancient. Irrefutable.",
      tvn_ko: 'tvN 약 48:20 — 현재. 19세 지은탁 앞에 처음 나타난 김신이 조용하고 담담하게 "나는 도깨비다"라고 말합니다. 수백 년의 무게가 담긴 세 마디입니다.',
      meaning: '"나는" = I (casual), "도깨비" = Goblin (Korean mythological creature), "~다" = plain form "to be." The plain form "~다" sounds declarative and strong — not polite speech, but a statement of fact.',
      meaning_ko: '"나는"은 나(반말), "도깨비"는 한국 신화 속 초자연적 존재, "~다"는 해라체 서술형입니다. "~다"는 공손한 말투가 아닌 사실 선언의 어감을 줍니다.',
      example: 'A: "Who are you exactly?" B: "나는 이 동네 오래된 주민이다. That\'s all you need to know."',
      example_ko: 'A: "당신은 대체 누구예요?" B: "나는 이 동네 오래된 주민이다. 그것만 알면 돼."',
      youtubeUrl: ''
    },
    {

  var EP_NUM = 1;

  var EP_NUM = 1;
  var TOTAL  = 30;

  function goHome() { window.location.href = '../../../index.html'; }

  /* Called by setLang() in app.js on every language switch */
  function applyPageLang() {
    buildExpressions();
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var list = document.getElementById('exprList');
    if (!list) return;

    // Update UI text
    var secLbl = document.getElementById('expr-section-label');
    if (secLbl) secLbl.innerHTML = isKo
      ? '&#127472;&#127479; 한국어 표현 30개 &mdash; 도깨비 1화'
      : '&#127482;&#127480; 30 Korean Expressions &mdash; Guardian Episode 1';

    document.getElementById('nav-home').textContent  = isKo ? '홈' : 'Home';
    document.getElementById('nav-back').textContent  = isKo ? '도깨비로' : 'Back to Guardian';
    document.getElementById('bc-ep').textContent     = isKo ? '1화' : 'E1';
    document.getElementById('hdr-title').textContent = isKo ? '도깨비 — 1화' : 'Guardian — Episode 1';
    document.getElementById('hdr-meta').textContent  = isKo
      ? '한국어 표현 30개 · 쇼츠를 클릭해 장면에서 확인하세요'
      : '30 Korean Expressions · Click a Short to watch in context';
    document.getElementById('bm-ep-label').textContent = isKo ? '에피소드 저장' : 'Bookmark Episode';

    var dataExprs = EP_DATA.expressions || [];
    var html = '';

    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'guardian-e' + EP_NUM + 'x' + num;
      var bmUrl = 'dramas/guardian/episodes/ep' + EP_NUM + '.html#slot' + num;

      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.length > 10;
        var ytLabel = isKo
          ? (isLive ? '&#9654; 쇼츠 보기' : '&#9654; 쇼츠 준비중')
          : (isLive ? '&#9654; Watch Short' : '&#9654; Short Coming Soon');
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + escHtml(x.youtubeUrl) + '" target="_blank" rel="noopener">' + ytLabel + '</a>'
          : '<button class="btn-youtube pending">' + ytLabel + '</button>';

        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var sceneCtx = (isKo && x.tvn_ko) ? x.tvn_ko : (x.tvn || '');
        var exprNumLabel = isKo ? ('표현 ' + num) : ('Expression ' + num);
        var bmLabel = isKo ? '&#128278; 저장' : '&#128278; Bookmark';

        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNumLabel + ' &middot; Guardian E' + EP_NUM + '</div>';
        html += '<div class="expr-korean">' + escHtml(x.korean) + '</div>';
        html += '<div class="expr-roman">' + escHtml(x.romanization) + '</div>';
        html += '<div class="expr-english">' + escHtml(x.english) + '</div>';
        if (sceneCtx) html += '<div class="expr-scene">&#128249; ' + escHtml(sceneCtx) + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + bmLabel + '</button>';
        html += '</div></div>';

      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">' + (isKo ? '표현 ' : 'Expression ') + num + '</div>';
        html += '<div class="expr-korean" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Coming soon.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">&#9654; Short Coming Soon</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">&#128278; Bookmark</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
    syncBookmarkButtons();
  }

  function handleExprBm(num) {
    toggleBookmark('expression', 'guardian-e'+EP_NUM+'x'+num,
      '&#128172; Guardian E'+EP_NUM+' #'+num,
      'dramas/guardian/episodes/ep'+EP_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    if (!hasAgreed()) {
      window.location.href = '../../../index.html?redirect=' + encodeURIComponent(window.location.href);
      return;
    }
    if (!EP_DATA.available) {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;';
      overlay.innerHTML =
        '<div style="font-size:3rem;margin-bottom:1rem;">&#128274;</div>'
        + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent);margin-bottom:0.5rem;">Coming Soon</div>'
        + '<div style="font-size:0.9rem;color:var(--muted);margin-bottom:2rem;">This episode is not available yet.<br>Check back soon!</div>'
        + '<button onclick="history.back()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:0.95rem;font-weight:800;cursor:pointer;">&#9664; Go Back</button>';
      document.body.appendChild(overlay);
      return;
    }
    injectTermsModal();
    document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
    applyLang();
    buildExpressions();
    renderBookmarkBar();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });

</script>
