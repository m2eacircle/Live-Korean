  titleEn: 'Guardian: The Lonely and Great God — Episode 1',
  titleKo: '쓸쓸하고 찬란하神 – 도깨비 1화',
  expressions: [
    {
      korean: '살려주세요',
      romanization: 'Saryeo juseyo',
      english: 'Help me / Please save me',
      partOfSpeech: 'expression',
      meaning: 'A desperate plea for help or rescue. Literally "please save (my life)." Used in urgent or dangerous situations — much stronger than a simple "help me."',
      meaning_ko: '"살려주세요"는 목숨이 위태로운 상황에서 쓰는 간절한 구조 요청 표현입니다. 단순히 "도와줘"보다 훨씬 절박한 어감이 담겨 있으며, 위험하거나 긴박한 상황에서 사용합니다.',
      example: 'A: "Help! Someone help me!" B: "살려주세요! 살려주세요!"',
      example_ko: 'A: "도와줘! 누가 좀 도와줘요!" B: "살려주세요! 살려주세요!"',
      context: 'Ji Eun-tak is in genuine peril and calls out desperately. Her cry triggers the Goblin\'s connection to her — a pivotal moment in episode 1.',
      context_ko: '지은탁이 위험에 처해 절박하게 외치는 장면. 이 외침이 도깨비와의 인연을 촉발시키는 1화의 핵심 장면입니다.',
      youtubeUrl: ''
    },
    {
      korean: '괜찮아요',
      romanization: 'Gwaenchanayo',
      english: "It's okay / I'm fine",
      partOfSpeech: 'expression',
      meaning: 'One of the most versatile expressions in Korean. Used to say you\'re okay, to reassure others, or to decline an offer. Tone changes the meaning: said gently it\'s reassuring; said sharply it can mean "leave it alone."',
      meaning_ko: '"괜찮아요"는 한국어에서 가장 다재다능한 표현 중 하나입니다. 내가 괜찮다, 상대를 안심시키거나, 또는 제안을 거절할 때도 씁니다. 톤에 따라 뜻이 달라집니다.',
      example: 'A: "Are you hurt?" B: "괜찮아요. Don\'t worry about me."',
      example_ko: 'A: "다쳤어요?" B: "괜찮아요. 걱정 마세요."',
      context: 'Ji Eun-tak says this after a frightening encounter, trying to appear brave even when she\'s shaken.',
      context_ko: '지은탁이 무서운 경험 후에도 씩씩하게 보이려고 이 말을 하는 장면입니다.',
      youtubeUrl: ''
    },
    {
      korean: '감사합니다',
      romanization: 'Gamsahamnida',
      english: 'Thank you (formal)',
      partOfSpeech: 'expression',
      meaning: 'The formal, polite way to say "thank you" in Korean. Used in professional settings, with elders, or strangers. More respectful than "고마워요" (gomawoyo). You will hear this constantly in Korean dramas.',
      meaning_ko: '"감사합니다"는 한국어에서 공식적이고 격식 있는 감사 표현입니다. 직장, 어른, 처음 만난 사람에게 사용합니다. "고마워요"보다 더 존중의 표시입니다. 한국 드라마에서 가장 자주 들을 수 있는 표현 중 하나입니다.',
      example: 'A: "Here is your order." B: "감사합니다."',
      example_ko: 'A: "주문하신 거 나왔습니다." B: "감사합니다."',
      context: 'Used throughout episode 1 when characters receive help or a favour — a cornerstone of Korean polite speech.',
      context_ko: '1화 전반에 걸쳐 도움을 받거나 호의를 베풀어 받을 때 나오는 표현으로, 한국 존댓말의 핵심입니다.',
      youtubeUrl: ''
    },
    {
      korean: '미안해요',
      romanization: 'Mianhaeyo',
      english: "I'm sorry",
      partOfSpeech: 'expression',
      meaning: 'A sincere, polite apology. More personal and heartfelt than the very formal "죄송합니다" (joesonghamnida). Often used between friends, family, or people of similar age. You can also hear "미안해" (informal) between close friends.',
      meaning_ko: '"미안해요"는 진심 어린 정중한 사과 표현입니다. "죄송합니다"보다는 덜 격식적이지만 충분히 공손합니다. 친구나 비슷한 나이 사람들 사이에 자주 씁니다. 친한 사이에서는 "미안해"를 씁니다.',
      example: 'A: "You forgot my birthday." B: "미안해요. I totally forgot."',
      example_ko: 'A: "내 생일 잊었잖아요." B: "미안해요. 완전히 잊고 있었어요."',
      context: 'Kim Shin (the Goblin) apologises to Ji Eun-tak early in the episode — a rare moment of vulnerability for an immortal being.',
      context_ko: '김신(도깨비)이 1화 초반 지은탁에게 사과하는 장면. 불사의 존재가 보여주는 드문 취약한 순간입니다.',
      youtubeUrl: ''
    },
    {
      korean: '어디 가세요?',
      romanization: 'Eodi gaseyo?',
      english: 'Where are you going?',
      partOfSpeech: 'expression',
      meaning: 'A polite question asking someone\'s destination. "어디" means "where," "가세요" is the formal/polite form of "가다" (to go). Koreans often ask this as a greeting — it doesn\'t always demand a specific answer.',
      meaning_ko: '"어디 가세요?"는 상대방의 목적지를 묻는 공손한 질문입니다. "어디"는 어디, "가세요"는 "가다"의 존댓말입니다. 한국에서는 인사처럼 이 말을 하기도 하며, 꼭 정확한 답변을 원하지 않을 때도 씁니다.',
      example: 'A: "어디 가세요?" B: "I\'m heading to the market. Want to join?"',
      example_ko: 'A: "어디 가세요?" B: "시장에 가요. 같이 갈래요?"',
      context: 'The Goblin appears suddenly and asks Ji Eun-tak this question — a simple phrase loaded with otherworldly significance in their first encounter.',
      context_ko: '도깨비가 갑자기 나타나 지은탁에게 이 질문을 하는 장면. 두 사람의 첫 만남에서 단순한 질문이 묘한 무게감을 가집니다.',
      youtubeUrl: ''
    },
    {
      korean: '이름이 뭐예요?',
      romanization: 'Ireumi mwoyeyo?',
      english: "What's your name?",
      partOfSpeech: 'expression',
      meaning: '"이름" means "name," "이" is the subject marker, "뭐예요?" means "what is it?" A standard polite way to ask someone\'s name when you first meet. Between close friends you\'d say "이름이 뭐야?"',
      meaning_ko: '"이름"은 이름, "이"는 주격 조사, "뭐예요?"는 "무엇이에요?"의 줄임말입니다. 처음 만났을 때 상대방의 이름을 묻는 기본적인 공손한 표현입니다. 친한 사이에서는 "이름이 뭐야?"라고 합니다.',
      example: 'A: "Hi, I\'m new here." B: "이름이 뭐예요? Nice to meet you."',
      example_ko: 'A: "안녕하세요, 저 새로 왔어요." B: "이름이 뭐예요? 만나서 반가워요."',
      context: 'A key exchange between Kim Shin and Ji Eun-tak — learning each other\'s name is the beginning of their extraordinary bond.',
      context_ko: '김신과 지은탁이 서로의 이름을 묻는 장면. 이름을 아는 것이 두 사람의 특별한 인연의 시작입니다.',
      youtubeUrl: ''
    },
    {
      korean: '처음이에요',
      romanization: 'Cheoeum-ieyo',
      english: "It's my first time",
      partOfSpeech: 'expression',
      meaning: 'Used to indicate you\'re experiencing something for the first time. "처음" means "first" or "the beginning." You can combine it with other verbs: "처음 봐요" (I\'ve never seen this before) or "처음 먹어봐요" (it\'s my first time trying this food).',
      meaning_ko: '"처음이에요"는 무언가를 처음 경험할 때 쓰는 표현입니다. "처음"은 처음, 시작을 의미합니다. "처음 봐요"(처음 봐요), "처음 먹어봐요"처럼 다른 동사와 결합할 수 있습니다.',
      example: 'A: "Have you been to Korea before?" B: "처음이에요! Everything is so exciting."',
      example_ko: 'A: "한국에 와본 적 있어요?" B: "처음이에요! 모든 게 너무 신기해요."',
      context: 'Ji Eun-tak\'s sense of wonder in episode 1 — many things are happening to her for the very first time.',
      context_ko: '1화에서 지은탁이 처음 겪는 신기한 일들로 가득한 장면들에서 나오는 표현입니다.',
      youtubeUrl: ''
    },
    {
      korean: '몰라요',
      romanization: 'Mollayo',
      english: "I don't know",
      partOfSpeech: 'expression',
      meaning: 'The polite form of "모르다" (to not know). Short, direct, and used constantly in everyday Korean. Said with a rising tone it sounds like a genuine admission; with a flat tone it can sound dismissive. Can also mean "I don\'t care" depending on context.',
      meaning_ko: '"몰라요"는 "모르다"의 존댓말입니다. 짧고 직접적인 표현으로 일상에서 매우 자주 씁니다. 올라가는 톤으로 말하면 솔직한 모름의 표현이지만, 무미건조하게 말하면 "관심없어"처럼 들릴 수 있습니다.',
      example: 'A: "Where did he go?" B: "몰라요. He just disappeared."',
      example_ko: 'A: "그 사람 어디 갔어요?" B: "몰라요. 그냥 사라졌어요."',
      context: 'Ji Eun-tak honestly admits she doesn\'t understand what\'s happening to her — why she can see ghosts, why candles light by themselves.',
      context_ko: '지은탁이 자신에게 왜 이런 일이 일어나는지, 왜 귀신이 보이고 촛불이 저절로 켜지는지 모른다고 솔직하게 인정하는 장면입니다.',
      youtubeUrl: ''
    },
    {
      korean: '맞아요',
      romanization: 'Majayo',
      english: "That's right / Correct",
      partOfSpeech: 'expression',
      meaning: 'Used to confirm something is correct. "맞다" literally means "to be correct/right." Similar to "Yes, exactly" or "That\'s right." Very common in conversations — you\'ll hear it constantly when Koreans agree with something.',
      meaning_ko: '"맞아요"는 무언가가 맞다, 옳다는 것을 확인할 때 씁니다. "맞다"는 문자 그대로 "맞다, 옳다"는 뜻입니다. "맞아요"는 한국어 대화에서 동의할 때 매우 자주 쓰는 표현입니다.',
      example: 'A: "So you\'re saying the meeting is at 3?" B: "맞아요! Don\'t be late."',
      example_ko: 'A: "그러니까 회의가 3시라고요?" B: "맞아요! 늦지 마세요."',
      context: 'Used when characters confirm information or agree — a small word that carries the story\'s logic forward.',
      context_ko: '등장인물들이 정보를 확인하거나 동의할 때 나오는 표현으로, 이야기를 앞으로 이끌어가는 작은 단어입니다.',
      youtubeUrl: ''
    },
    {
      korean: '아니에요',
      romanization: 'Anieyo',
      english: "No / That's not it",
      partOfSpeech: 'expression',
      meaning: 'A polite negation. "아니다" means "to not be (something)." Used to deny, correct, or disagree. Very different from "없어요" (there isn\'t) — "아니에요" disputes identity or description, not existence.',
      meaning_ko: '"아니에요"는 정중한 부정 표현입니다. "아니다"는 "~이 아니다"는 뜻입니다. 부정하거나 수정하거나 동의하지 않을 때 씁니다. "없어요"(존재하지 않는다)와는 다른 뉘앙스입니다.',
      example: 'A: "Are you angry?" B: "아니에요. I\'m just tired."',
      example_ko: 'A: "화났어요?" B: "아니에요. 그냥 피곤해요."',
      context: 'Kim Shin deflects assumptions about his nature with this word — "I\'m not what you think I am."',
      context_ko: '김신이 자신의 본질에 대한 상대방의 추측을 이 말로 부정하는 장면입니다.',
      youtubeUrl: ''
    },
    {
      korean: '왜 그래요?',
      romanization: 'Wae geuraeyo?',
      english: "What's wrong? / Why are you acting like that?",
      partOfSpeech: 'expression',
      meaning: '"왜" means "why," "그래요" is "it is like that / you\'re doing that." Together: "Why are you like that?" or "What\'s the matter?" Shows concern or mild frustration. Tone determines whether it\'s caring or confrontational.',
      meaning_ko: '"왜"는 왜, "그래요"는 "그렇다/그러다"의 존댓말입니다. 합쳐서 "왜 그래요?"는 "왜 그러세요?", "무슨 일이에요?"를 의미합니다. 걱정이나 가벼운 불만을 표현하며, 톤에 따라 다정하거나 대립적으로 들릴 수 있습니다.',
      example: 'A: "You\'ve been quiet all day." B: "왜 그래요? Did something happen?"',
      example_ko: 'A: "하루 종일 말이 없네요." B: "왜 그래요? 무슨 일 있어요?"',
      context: 'Ji Eun-tak confronts the Goblin with this question when his mood shifts mysteriously without explanation.',
      context_ko: '지은탁이 도깨비의 분위기가 갑자기 바뀌자 이유를 묻는 장면입니다.',
      youtubeUrl: ''
    },
    {
      korean: '무슨 일이에요?',
      romanization: 'Museun il-ieyo?',
      english: 'What happened? / What\'s going on?',
      partOfSpeech: 'expression',
      meaning: '"무슨" means "what kind of," "일" means "thing/matter/event," "이에요" is "is it?" Asking what event or situation has occurred. More specific than "왜 그래요?" — you\'re asking about a concrete event.',
      meaning_ko: '"무슨"은 무슨 종류의, "일"은 일/사건, "이에요"는 "이에요?"의 줄임입니다. 어떤 사건이나 상황이 발생했는지 묻는 표현입니다. "왜 그래요?"보다 더 구체적인 사건을 묻습니다.',
      example: 'A: "I heard a loud noise from your room." B: "무슨 일이에요? Are you okay?"',
      example_ko: 'A: "방에서 큰 소리가 났는데요." B: "무슨 일이에요? 괜찮아요?"',
      context: 'Repeated throughout episode 1 as characters encounter strange, inexplicable events connected to the Goblin\'s powers.',
      context_ko: '1화에서 도깨비의 능력과 연관된 이상하고 설명하기 어려운 사건들이 연속으로 벌어지면서 나오는 표현입니다.',
      youtubeUrl: ''
    },
    {
      korean: '진짜요?',
      romanization: 'Jinjjayo?',
      english: 'Really? / Seriously?',

      meaning_ko: '"운명"은 운명, 숙명을 뜻하고 "이에요"는 "이다"의 존댓말입니다. 한국 문화에서 매우 무게감 있는 단어입니다. 운명은 많은 한국 드라마의 핵심 테마로, 어떤 사람들이 만나고 서로에게 영향을 미치도록 우주적으로 정해졌다는 개념입니다.',
      example: 'A: "Of all the people in this city, we ended up on the same bus." B: "운명이에요."',
      example_ko: 'A: "이 도시 수많은 사람 중에 우리가 같은 버스를 탔네요." B: "운명이에요."',
      context: 'The central thesis of the entire drama — Kim Shin and Ji Eun-tak were destined to meet across centuries.',
      context_ko: '드라마 전체의 핵심 주제. 김신과 지은탁은 수백 년에 걸쳐 만날 운명이었습니다.',
      youtubeUrl: ''

    {

      meaning: '"기억" means "memory," "이" is the subject marker, "안 나요" means "doesn\'t come out" — in Korean, memories "come out" or "don\'t come out." This poetic structure means "the memory doesn\'t surface." Deeply resonant in a drama about immortality and forgetting.',
      meaning_ko: '"기억"은 기억, "안 나요"는 "나지 않아요"의 줄임입니다. 한국어에서 기억은 "나다"(나오다) 또는 "나지 않다"(나오지 않다)고 표현합니다. 이 시적인 구조는 "기억이 떠오르지 않는다"는 뜻입니다. 불멸과 망각에 관한 드라마에서 깊이 울리는 표현입니다.',
      example: 'A: "Do you remember where we first met?" B: "기억이 안 나요. It was so long ago."',
      example_ko: 'A: "우리 처음 만난 곳 기억해요?" B: "기억이 안 나요. 너무 오래됐어요."',
      context: 'Kim Shin carries the weight of 939 years of memories — and Ji Eun-tak carries echoes she doesn\'t yet understand.',
      context_ko: '김신은 939년의 기억의 무게를 지고 있습니다. 지은탁은 아직 이해하지 못하는 잔상을 품고 있습니다.',
      youtubeUrl: ''
    },
    {
      korean: '다시 말해 주세요',
      romanization: 'Dasi malhae juseyo',
      english: 'Please say it again / Could you repeat that?',
      partOfSpeech: 'expression',
      meaning: '"다시" means "again," "말해 주세요" is "please tell/say." An extremely useful phrase for Korean learners — when you hear something and aren\'t sure, you ask to hear it again. Polite and natural. You can also say "다시 한번만요" (just one more time).',
      meaning_ko: '"다시"는 다시, "말해 주세요"는 "말해주세요"입니다. 한국어 학습자에게 매우 유용한 표현입니다. 잘 들리지 않거나 이해가 안 될 때 다시 말해달라고 요청하는 정중하고 자연스러운 표현입니다. "다시 한번만요"도 쓸 수 있습니다.',
      example: 'A: "다시 말해 주세요? I didn\'t catch that." B: "Of course. I said we need to leave at 7."',

      context: 'Ji Eun-tak asks Kim Shin to repeat the impossible things he\'s told her — she heard them, she just needs them to be real.',
      context_ko: '지은탁이 김신에게 그가 말한 믿기 어려운 것들을 다시 말해달라고 하는 장면. 들었지만, 그것이 현실이어야 한다는 것을 확인하고 싶은 것입니다.',

  var EP_NUM = 1;
  var TOTAL  = 30;

  function goHome() { window.location.href = '../../../index.html'; }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var list = document.getElementById('exprList');
    if (!list) return;

    // Update UI text
    var secLbl = document.getElementById('expr-section-label');
    if (secLbl) secLbl.innerHTML = isKo
      ? '&#127472;&#127479; 한국어 표현 30개 &mdash; 도깨비 1화'
      : '&#127482;&#127480; 30 Korean Expressions &mdash; Guardian Episode 1';

    document.getElementById('nav-home').textContent  = isKo ? '홈' : 'Home';
    document.getElementById('nav-back').textContent  = isKo ? '도깨비로' : 'Back to Guardian';
    document.getElementById('bc-ep').textContent     = isKo ? '1화' : 'E1';
    document.getElementById('hdr-title').textContent = isKo ? '도깨비 — 1화' : 'Guardian — Episode 1';
    document.getElementById('hdr-meta').textContent  = isKo
      ? '한국어 표현 30개 · 쇼츠를 클릭해 장면에서 확인하세요'
      : '30 Korean Expressions · Click a Short to watch in context';
    document.getElementById('bm-ep-label').textContent = isKo ? '에피소드 저장' : 'Bookmark Episode';

    var dataExprs = EP_DATA.expressions || [];
    var html = '';

    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'guardian-e' + EP_NUM + 'x' + num;
      var bmUrl = 'dramas/guardian/episodes/ep' + EP_NUM + '.html#slot' + num;

      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.length > 10;
        var ytLabel = isKo
          ? (isLive ? '&#9654; 쇼츠 보기' : '&#9654; 쇼츠 준비중')
          : (isLive ? '&#9654; Watch Short' : '&#9654; Short Coming Soon');
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + escHtml(x.youtubeUrl) + '" target="_blank" rel="noopener">' + ytLabel + '</a>'
          : '<button class="btn-youtube pending">' + ytLabel + '</button>';

        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNumLabel = isKo ? ('표현 ' + num) : ('Expression ' + num);
        var bmLabel = isKo ? '&#128278; 저장' : '&#128278; Bookmark';

        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNumLabel + ' &middot; Guardian E' + EP_NUM + '</div>';
        html += '<div class="expr-korean">' + escHtml(x.korean) + '</div>';
        html += '<div class="expr-roman">' + escHtml(x.romanization) + '</div>';
        html += '<div class="expr-english">' + escHtml(x.english) + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + bmLabel + '</button>';
        html += '</div></div>';

      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">' + (isKo ? '표현 ' : 'Expression ') + num + '</div>';
        html += '<div class="expr-korean" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Coming soon.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">&#9654; Short Coming Soon</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">&#128278; Bookmark</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
    syncBookmarkButtons();
  }

  function handleExprBm(num) {
    toggleBookmark('expression', 'guardian-e'+EP_NUM+'x'+num,
      '&#128172; Guardian E'+EP_NUM+' #'+num,
      'dramas/guardian/episodes/ep'+EP_NUM+'.html#slot'+num);
  }
  });

  window.addEventListener('DOMContentLoaded', function() {
    if (!hasAgreed()) {
      window.location.href = '../../../index.html?redirect=' + encodeURIComponent(window.location.href);
      return;
    }
    if (!EP_DATA.available) {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;';
      overlay.innerHTML =
        '<div style="font-size:3rem;margin-bottom:1rem;">&#128274;</div>'
        + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent);margin-bottom:0.5rem;">Coming Soon</div>'
        + '<div style="font-size:0.9rem;color:var(--muted);margin-bottom:2rem;">This episode is not available yet.<br>Check back soon!</div>'
        + '<button onclick="history.back()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:0.95rem;font-weight:800;cursor:pointer;">&#9664; Go Back</button>';
      document.body.appendChild(overlay);
      return;
    }
    document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
    applyLang();
    buildExpressions();
    renderBookmarkBar();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });

  function setLang(lang) {
    saveLang(lang);
    document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
    buildExpressions();
    renderBookmarkBar();
    syncBookmarkButtons();
  }
</script>
</body>
</html>
