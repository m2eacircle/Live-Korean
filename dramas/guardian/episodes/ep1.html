var EP_DATA = {
  available: true,
  titleEn: 'Guardian: The Lonely and Great God — Episode 1',
  titleKo: '쓸쓸하고 찬란하神 – 도깨비 1화',
  expressions: [
    {
      korean: '살려주세요',
      romanization: 'Saryeo juseyo',
      english: 'Help me',
      partOfSpeech: 'expression',
      meaning: 'A desperate plea for help or rescue. Literally "please save (my life)." Used in urgent or life-threatening situations — far stronger than a casual "help me."',
      meaning_ko: '"살려주세요"는 목숨이 위태로운 순간에 쓰는 가장 절박한 구조 요청 표현입니다. 단순히 "도와주세요"보다 훨씬 긴박하고 강한 어감을 가집니다.',
      example: 'A: "Is anyone there?" B: "살려주세요! Please, someone help me!"',
      example_ko: 'A: "거기 누구 있어요?" B: "살려주세요! 제발 누가 도와주세요!"',
      context: 'Ji Eun-tak cries out in genuine peril. Her desperate call is what first connects her to the Goblin — the pivotal inciting moment of the entire drama.',
      context_ko: '지은탁이 진짜 위험에 처해 절박하게 외치는 장면. 이 외침이 도깨비와의 인연을 시작시키는 1화의 핵심 순간입니다.',
      youtubeUrl: ''
    },
    {
      korean: '괜찮아요',
      romanization: 'Gwaenchanayo',
      english: "It's okay / I'm fine",
      partOfSpeech: 'expression',
      meaning: 'One of the most versatile expressions in Korean. Means "I\'m okay," "it\'s alright," or even "no thank you" depending on context. Tone changes everything — gentle means reassuring, flat means "drop it."',
      meaning_ko: '"괜찮아요"는 한국어에서 가장 다재다능한 표현입니다. 내가 괜찮다는 뜻도, 상대를 안심시키는 말도, 때로는 제안을 거절하는 말도 됩니다. 어떤 톤으로 말하느냐에 따라 의미가 달라집니다.',
      example: 'A: "You look pale — are you okay?" B: "괜찮아요. Just a bit tired."',
      example_ko: 'A: "얼굴이 창백해요, 괜찮아요?" B: "괜찮아요. 그냥 좀 피곤해서요."',
      context: 'Ji Eun-tak uses this after a frightening encounter, trying to seem braver than she feels. A small word that carries a lot of weight.',
      context_ko: '지은탁이 무서운 경험을 하고도 씩씩하게 보이려고 이 말을 쓰는 장면. 작은 한 마디가 많은 걸 담고 있습니다.',
      youtubeUrl: ''
    },
    {
      korean: '감사합니다',
      romanization: 'Gamsahamnida',
      english: 'Thank you',
      partOfSpeech: 'expression',
      meaning: 'The formal, respectful way to say "thank you" in Korean. Used with elders, strangers, or in professional situations. More polite than "고마워요." One of the first expressions every Korean learner picks up.',
      meaning_ko: '"감사합니다"는 격식 있고 정중한 감사 표현입니다. 어른, 낯선 사람, 직장 상황에서 씁니다. "고마워요"보다 더 공손하며, 한국어를 배우는 사람이라면 가장 먼저 익히는 표현 중 하나입니다.',
      example: 'A: "I saved you a seat." B: "감사합니다. That was very kind."',
      example_ko: 'A: "자리 맡아놨어요." B: "감사합니다. 정말 친절하시네요."',
      context: 'Heard throughout episode 1 whenever characters receive a kindness — a foundation of Korean polite speech.',
      context_ko: '1화 전반에 걸쳐 호의를 받을 때마다 나오는 표현으로, 한국어 존댓말의 기본입니다.',
      youtubeUrl: ''
    },
    {
      korean: '미안해요',
      romanization: 'Mianhaeyo',
      english: "I'm sorry",
      partOfSpeech: 'expression',
      meaning: 'A sincere, polite apology between people of similar age or status. Less formal than "죄송합니다" but still fully respectful. Between close friends, "미안해" is used instead.',
      meaning_ko: '"미안해요"는 비슷한 나이나 관계에서 쓰는 진심 어린 사과 표현입니다. "죄송합니다"보다는 덜 격식적이지만 충분히 공손합니다. 친한 사이에서는 "미안해"를 씁니다.',
      example: 'A: "You forgot to call me back." B: "미안해요. I completely lost track of time."',
      example_ko: 'A: "전화 다시 안 했잖아요." B: "미안해요. 시간 가는 줄 몰랐어요."',
      context: 'Kim Shin apologises to Ji Eun-tak in an early scene — a rare, disarming moment for an immortal being who rarely admits fault.',
      context_ko: '김신이 지은탁에게 사과하는 초반 장면. 9백 년을 산 존재가 좀처럼 잘못을 인정하는 드문 순간입니다.',
      youtubeUrl: ''
    },
    {
      korean: '어디 가세요?',
      romanization: 'Eodi gaseyo?',
      english: 'Where are you going?',
      partOfSpeech: 'expression',
      meaning: '"어디" = where, "가세요" = the polite form of "go." A simple question that Koreans also use as a casual greeting — not always expecting a precise answer.',
      meaning_ko: '"어디"는 어디, "가세요"는 "가다"의 존댓말입니다. 상대의 목적지를 묻는 질문이지만, 한국에서는 인사처럼 쓰이기도 해서 꼭 정확한 대답을 원하지 않는 경우도 많습니다.',
      example: 'A: "어디 가세요?" B: "Just heading to the convenience store. Want anything?"',
      example_ko: 'A: "어디 가세요?" B: "편의점 가려고요. 뭐 사다 드릴까요?"',
      context: 'The Goblin appears suddenly and asks Ji Eun-tak this — a simple question made otherworldly by who is asking it.',
      context_ko: '도깨비가 갑자기 나타나 지은탁에게 묻는 장면. 묻는 사람이 누구냐에 따라 평범한 질문이 비범해집니다.',
      youtubeUrl: ''
    },
    {
      korean: '이름이 뭐예요?',
      romanization: 'Ireumi mwoyeyo?',
      english: "What's your name?",
      partOfSpeech: 'expression',
      meaning: '"이름" = name, "이" = subject marker, "뭐예요?" = what is it? The standard polite way to ask someone\'s name when you first meet. With close friends: "이름이 뭐야?"',
      meaning_ko: '"이름"은 이름, "뭐예요?"는 "무엇이에요?"의 줄임입니다. 처음 만났을 때 상대의 이름을 묻는 기본 표현입니다. 친한 사이에서는 "이름이 뭐야?"라고 합니다.',
      example: 'A: "Hi, I don\'t think we\'ve met." B: "이름이 뭐예요? I\'m Jimin."',
      example_ko: 'A: "안녕하세요, 처음 뵙는 것 같아요." B: "이름이 뭐예요? 저는 지민이에요."',
      context: 'Kim Shin and Ji Eun-tak exchange names for the first time — the beginning of a bond that spans centuries.',
      context_ko: '김신과 지은탁이 처음으로 이름을 묻고 답하는 장면. 수백 년에 걸친 인연의 시작입니다.',
      youtubeUrl: ''
    },
    {
      korean: '처음이에요',
      romanization: 'Cheoeum-ieyo',
      english: "It's my first time",
      partOfSpeech: 'expression',
      meaning: '"처음" means "first" or "the beginning." Used to say something is a first experience. Can be combined with other verbs: "처음 봐요" (first time seeing this), "처음 먹어봐요" (first time trying this food).',
      meaning_ko: '"처음"은 처음, 시작을 의미합니다. 어떤 것을 처음 경험할 때 씁니다. "처음 봐요"(처음 보다), "처음 먹어봐요"처럼 다른 동사와도 결합할 수 있습니다.',
      example: 'A: "Have you tried bibimbap before?" B: "처음이에요. What do I mix in first?"',
      example_ko: 'A: "비빔밥 먹어본 적 있어요?" B: "처음이에요. 뭐부터 비벼요?"',
      context: 'Ji Eun-tak encounters the supernatural world for the first time — her reactions of wonder and fear make this expression deeply fitting.',
      context_ko: '지은탁이 처음으로 초자연적인 세계를 마주치는 장면. 경이로움과 두려움이 뒤섞인 반응이 이 표현을 딱 맞게 만들어줍니다.',
      youtubeUrl: ''
    },
    {
      korean: '몰라요',
      romanization: 'Mollayo',
      english: "I don't know",
      partOfSpeech: 'expression',
      meaning: 'Polite form of "모르다" (to not know). Short and direct. Said with a rising tone it sounds honest; said flatly it can sound dismissive. In some contexts also means "I don\'t care."',
      meaning_ko: '"모르다"의 존댓말입니다. 짧고 직접적인 표현으로 일상에서 매우 자주 씁니다. 올라가는 톤으로 말하면 솔직한 모름의 표현이지만, 무미건조하게 말하면 "관심없어"처럼 들릴 수 있습니다.',
      example: 'A: "Why did he leave without saying anything?" B: "몰라요. He never explains himself."',
      example_ko: 'A: "왜 아무 말 없이 갔어요?" B: "몰라요. 그 사람 원래 설명을 안 해요."',
      context: 'Ji Eun-tak admits she has no idea why she can see ghosts or why candles light themselves around her — she\'s just as confused as everyone else.',
      context_ko: '지은탁이 왜 귀신이 보이는지, 왜 주변에서 촛불이 저절로 켜지는지 자신도 모른다고 솔직히 인정하는 장면입니다.',
      youtubeUrl: ''
    },
    {
      korean: '맞아요',
      romanization: 'Majayo',
      english: "That's right / Correct",
      partOfSpeech: 'expression',
      meaning: 'From "맞다" — to be correct. Used to confirm or agree. Equivalent to "Yes, exactly" or "That\'s right." Extremely common in everyday Korean conversations.',
      meaning_ko: '"맞다"는 맞다, 옳다는 뜻입니다. 무언가를 확인하거나 동의할 때 씁니다. "맞아요"는 한국어 일상 대화에서 가장 자주 쓰는 동의 표현 중 하나입니다.',
      example: 'A: "So you\'re saying this is all connected to the Goblin\'s curse?" B: "맞아요. Everything points to it."',
      example_ko: 'A: "그러니까 이게 다 도깨비의 저주와 연결된다는 거예요?" B: "맞아요. 모든 게 그쪽을 가리키고 있어요."',
      context: 'Characters piecing together the logic of the supernatural world confirm facts with this word — small but essential to moving the story forward.',
      context_ko: '등장인물들이 초자연적 세계의 논리를 맞춰가는 장면에서 사실을 확인할 때 쓰는 표현입니다.',
      youtubeUrl: ''
    },
    {
      korean: '아니에요',
      romanization: 'Anieyo',
      english: "No / That's not it",
      partOfSpeech: 'expression',
      meaning: 'Polite negation from "아니다" — to not be something. Used to deny, correct, or disagree. Different from "없어요" (there isn\'t any) — "아니에요" disputes an identity or description.',
      meaning_ko: '"아니다"의 존댓말입니다. 부정하거나, 수정하거나, 동의하지 않을 때 씁니다. "없어요"(존재하지 않는다)와 달리 "아니에요"는 어떤 사실이나 묘사를 부정합니다.',
      example: 'A: "Are you nervous?" B: "아니에요. I just look like this when I\'m focused."',
      example_ko: 'A: "긴장돼요?" B: "아니에요. 집중하면 원래 이런 얼굴이에요."',
      context: 'Kim Shin deflects assumptions about his nature and feelings with this word — the eternal bachelor insisting nothing is the way people think it is.',
      context_ko: '김신이 자신의 본질과 감정에 대한 상대방의 추측을 부정하는 장면. 9백 년의 독신자가 "그런 거 아니에요"라고 잇달아 부정합니다.',
      youtubeUrl: ''
    },
    {
      korean: '왜 그래요?',
      romanization: 'Wae geuraeyo?',
      english: "What's wrong? / Why are you acting like that?",
      partOfSpeech: 'expression',
      meaning: '"왜" = why, "그래요" = you\'re like that / doing that. Expresses concern ("what\'s the matter?") or mild frustration ("why are you being like this?"). The tone decides which.',
      meaning_ko: '"왜"는 왜, "그래요"는 "그렇다/그러다"의 존댓말입니다. 걱정("무슨 일이에요?")이나 가벼운 불만("왜 이러세요?")을 표현하며, 어떤 톤으로 말하느냐에 따라 다른 의미로 들립니다.',
      example: 'A: "You\'ve been staring out the window for an hour." B: "왜 그래요? Did something happen to you?"',
      example_ko: 'A: "한 시간째 창밖만 바라보고 있잖아요." B: "왜 그래요? 무슨 일 있었어요?"',
      context: 'Ji Eun-tak asks this when the Goblin\'s mood shifts suddenly and without explanation — she\'s concerned but also a little frustrated.',
      context_ko: '도깨비의 분위기가 이유 없이 갑자기 바뀌자 지은탁이 걱정 반, 답답함 반으로 묻는 장면입니다.',
      youtubeUrl: ''
    },
    {
      korean: '무슨 일이에요?',
      romanization: 'Museun il-ieyo?',
      english: 'What happened? / What\'s going on?',
      partOfSpeech: 'expression',
      meaning: '"무슨" = what kind of, "일" = thing / event, "이에요?" = is it? Asks about a specific event or situation. More concrete than "왜 그래요?" — you\'re asking what actually happened.',
      meaning_ko: '"무슨"은 어떤 종류의, "일"은 일/사건을 뜻합니다. 구체적으로 어떤 사건이 일어났는지 묻는 표현으로, "왜 그래요?"보다 더 사실 확인에 초점을 맞춥니다.',
      example: 'A: "Everyone looks so tense." B: "무슨 일이에요? Nobody is telling me anything."',
      example_ko: 'A: "다들 긴장한 것 같아요." B: "무슨 일이에요? 아무도 아무 말을 안 해요."',
      context: 'Repeated throughout episode 1 as one inexplicable thing after another occurs around Ji Eun-tak — a question that never quite gets a satisfying answer.',
      context_ko: '1화에서 지은탁 주변에 설명할 수 없는 일들이 연달아 벌어지면서 반복되는 표현. 만족스러운 답을 얻지 못하는 질문입니다.',
      youtubeUrl: ''
    },
    {
      korean: '진짜요?',
      romanization: 'Jinjjayo?',
      english: 'Really? / Seriously?',

      romanization: 'Gieogi an nayo',
      english: "I can't remember / I don't remember",
      partOfSpeech: 'expression',
      meaning: '"기억" = memory, "안 나요" = doesn\'t come out. In Korean, memories "come out" (나다) or "don\'t come out" — a poetic structure meaning the memory won\'t surface. Deeply resonant in a drama about an immortal haunted by centuries of remembering and forgetting.',
      meaning_ko: '"기억"은 기억, "안 나요"는 "나지 않아요"의 줄임입니다. 한국어에서 기억은 "나다" 또는 "나지 않다"고 표현하는데, 기억이 떠오르지 않는다는 시적인 구조입니다. 기억과 망각이 주제인 이 드라마에서 특히 깊이 울리는 표현입니다.',
      example: 'A: "Do you remember where we first met?" B: "기억이 안 나요. It was too long ago."',
      example_ko: 'A: "우리 처음 어디서 만났는지 기억해요?" B: "기억이 안 나요. 너무 오래전이에요."',
      context: 'Kim Shin carries 939 years of memories. Ji Eun-tak carries echoes of past lives she cannot yet understand. Both are haunted by what they cannot recall.',
      context_ko: '김신은 939년의 기억을 짊어지고 있습니다. 지은탁은 아직 이해하지 못하는 전생의 잔상을 품고 있습니다. 두 사람 모두 기억할 수 없는 것에 시달립니다.',
      youtubeUrl: ''
    },
    {
      korean: '다시 말해 주세요',
      romanization: 'Dasi malhae juseyo',
      english: 'Please say it again / Could you repeat that?',
      partOfSpeech: 'expression',
      meaning: '"다시" = again, "말해 주세요" = please say / tell. An extremely useful phrase for Korean learners — when you didn\'t catch something, you ask politely to hear it again. Also: "다시 한번만요" (just one more time).',
      meaning_ko: '"다시"는 다시, "말해 주세요"는 말해달라는 정중한 요청입니다. 한국어 학습자에게 매우 유용한 표현으로, 잘 못 들었거나 이해가 안 될 때 다시 말해달라고 요청합니다. "다시 한번만요"도 함께 알아두면 좋습니다.',
      example: 'A: "다시 말해 주세요? The music was loud and I missed that." B: "I said, do you want to get coffee?"',
      example_ko: 'A: "다시 말해 주세요? 음악이 시끄러워서 못 들었어요." B: "커피 한 잔 할래요? 라고 했어요."',
      context: 'Ji Eun-tak asks Kim Shin to repeat the impossible things he\'s told her. She heard him — she just needs the words to be real.',
      context_ko: '지은탁이 김신에게 믿기 어려운 말들을 다시 해달라고 부탁하는 장면. 들었지만 현실로 확인하고 싶은 마음입니다.',
      youtubeUrl: ''
    }
  ]
};

  var EP_NUM = 1;
  var TOTAL  = 30;

  function goHome() { window.location.href = '../../../index.html'; }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var list = document.getElementById('exprList');
    if (!list) return;

    // Update UI text
    var secLbl = document.getElementById('expr-section-label');
    if (secLbl) secLbl.innerHTML = isKo
      ? '&#127472;&#127479; 한국어 표현 30개 &mdash; 도깨비 1화'
      : '&#127482;&#127480; 30 Korean Expressions &mdash; Guardian Episode 1';

    document.getElementById('nav-home').textContent  = isKo ? '홈' : 'Home';
    document.getElementById('nav-back').textContent  = isKo ? '도깨비로' : 'Back to Guardian';
    document.getElementById('bc-ep').textContent     = isKo ? '1화' : 'E1';
    document.getElementById('hdr-title').textContent = isKo ? '도깨비 — 1화' : 'Guardian — Episode 1';
    document.getElementById('hdr-meta').textContent  = isKo
      ? '한국어 표현 30개 · 쇼츠를 클릭해 장면에서 확인하세요'
      : '30 Korean Expressions · Click a Short to watch in context';
    document.getElementById('bm-ep-label').textContent = isKo ? '에피소드 저장' : 'Bookmark Episode';

    var dataExprs = EP_DATA.expressions || [];
    var html = '';

    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'guardian-e' + EP_NUM + 'x' + num;
      var bmUrl = 'dramas/guardian/episodes/ep' + EP_NUM + '.html#slot' + num;

      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.length > 10;
        var ytLabel = isKo
          ? (isLive ? '&#9654; 쇼츠 보기' : '&#9654; 쇼츠 준비중')
          : (isLive ? '&#9654; Watch Short' : '&#9654; Short Coming Soon');
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + escHtml(x.youtubeUrl) + '" target="_blank" rel="noopener">' + ytLabel + '</a>'
          : '<button class="btn-youtube pending">' + ytLabel + '</button>';

        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNumLabel = isKo ? ('표현 ' + num) : ('Expression ' + num);
        var bmLabel = isKo ? '&#128278; 저장' : '&#128278; Bookmark';

        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNumLabel + ' &middot; Guardian E' + EP_NUM + '</div>';
        html += '<div class="expr-korean">' + escHtml(x.korean) + '</div>';
        html += '<div class="expr-roman">' + escHtml(x.romanization) + '</div>';
        html += '<div class="expr-english">' + escHtml(x.english) + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + bmLabel + '</button>';
        html += '</div></div>';

      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">' + (isKo ? '표현 ' : 'Expression ') + num + '</div>';
        html += '<div class="expr-korean" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Coming soon.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">&#9654; Short Coming Soon</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">&#128278; Bookmark</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
    syncBookmarkButtons();
  }

  function handleExprBm(num) {
    toggleBookmark('expression', 'guardian-e'+EP_NUM+'x'+num,
      '&#128172; Guardian E'+EP_NUM+' #'+num,
      'dramas/guardian/episodes/ep'+EP_NUM+'.html#slot'+num);
  }
  });

  window.addEventListener('DOMContentLoaded', function() {
    if (!hasAgreed()) {
      window.location.href = '../../../index.html?redirect=' + encodeURIComponent(window.location.href);
      return;
    }
    if (!EP_DATA.available) {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;';
      overlay.innerHTML =
        '<div style="font-size:3rem;margin-bottom:1rem;">&#128274;</div>'
        + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent);margin-bottom:0.5rem;">Coming Soon</div>'
        + '<div style="font-size:0.9rem;color:var(--muted);margin-bottom:2rem;">This episode is not available yet.<br>Check back soon!</div>'
        + '<button onclick="history.back()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:0.95rem;font-weight:800;cursor:pointer;">&#9664; Go Back</button>';
      document.body.appendChild(overlay);
      return;
    }
    document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
    applyLang();
    buildExpressions();
    renderBookmarkBar();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });

  function setLang(lang) {
    saveLang(lang);
    document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
    buildExpressions();
    renderBookmarkBar();
    syncBookmarkButtons();
  }
</script>
</body>
</html>
