/* ================================================================
   EPISODE DATA — Guardian Episode 1
   ----------------------------------------------------------------
   Each expression has:
     korean       : the Korean expression (한국어)

     english      : English translation

   ----------------------------------------------------------------
   30 slots total. Empty slots show as "Coming Soon" automatically.
================================================================ */
var EP_DATA = {
  available: true,
  titleEn: 'Guardian: The Lonely and Great God — Episode 1',
  titleKo: '쓸쓸하고 찬란하神 – 도깨비 1화',
  expressions: [
    {
      korean: '살려주세요',
      romanization: 'Saryeo juseyo',
      english: 'Please save me',
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 00:40 — The episode opens: a young woman (Eun-tak\'s mother) tells the old fortune-teller that she doesn\'t believe the Goblin story. The old woman warns her: at the moment her life flashes before her eyes, she should pray. This sets up the hit-and-run scene that follows.',
      tvn_ko: 'tvN 약 00:40 — 에피소드 오프닝: 젊은 여성(지은탁의 어머니)이 노파에게 도깨비 이야기를 믿지 않는다고 말합니다. 노파는 경고합니다: 삶이 눈앞에 스쳐 지나가는 순간 신께 자비를 빌라고. 이어지는 뺑소니 장면의 복선입니다.',
      meaning: 'Literally "please save my life." The most desperate plea in Korean — used only in life-threatening emergencies. Far stronger than 도와주세요 (please help me). The raw fear in the voice is everything.',
      meaning_ko: '문자 그대로 "제 목숨을 살려주세요"입니다. 한국어에서 가장 절박한 탄원으로, 생명이 위협받는 긴급 상황에서만 씁니다. "도와주세요"보다 훨씬 강렬합니다.',
      example: 'A: "살려주세요! Someone help, I can\'t swim!" B: "Hold on, I\'m coming!"',
      example_ko: 'A: "살려주세요! 수영을 못해요!" B: "잠깐만요, 지금 갈게요!"',
      youtubeUrl: ''
    },
    {
      korean: '저는 그냥 지나가는 사람이오',
      romanization: 'Jeoneun geunyang jinaganeun sarami-o',
      english: 'I am just a passerby',
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 35:30 — 1998. Eun-tak\'s mother is bleeding on the ground after the hit-and-run. Kim Shin crouches beside her. She asks desperately who he is. He says quietly: "저는 그냥 지나가는 사람이오." He is, and has been, a passerby in human lives for 939 years.',
      tvn_ko: 'tvN 약 35:30 — 1998년. 뺑소니를 당해 피를 흘리는 지은탁의 어머니 옆에 쪼그려 앉은 김신. 그녀가 당신이 누구냐고 묻자 그가 조용히 "저는 그냥 지나가는 사람이오"라고 말합니다. 939년 동안 그는 인간의 삶에서 그저 지나가는 사람이었습니다.',
      meaning: '"저는" = I (formal), "그냥" = just/simply, "지나가는" = passing, "사람이오" = person (archaic formal). This old-fashioned "~이오" ending is used by Kim Shin throughout — it marks him as ancient, not of this time.',
      meaning_ko: '"저는"은 격식체 1인칭, "그냥"은 그냥, "지나가는"은 지나가다의 현재분사, "사람이오"는 고어 격식체입니다. 김신이 쓰는 "~이오" 어미는 그가 이 시대 사람이 아님을 나타냅니다.',
      example: 'A: "Did you see what happened?" B: "저는 그냥 지나가는 사람이에요. I didn\'t see anything."',
      example_ko: 'A: "무슨 일이 있었는지 보셨어요?" B: "저는 그냥 지나가는 사람이에요. 아무것도 못 봤어요."',
      youtubeUrl: ''
    },
    {
      korean: '인간사에 개입하지 않소',
      romanization: 'Ingansa-e gaeiphaji anhso',
      english: 'I do not involve myself in human affairs',
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 36:00 — Eun-tak\'s mother begs Kim Shin to save her. He stands and says coldly: "인간사에 개입하지 않소." But then she stops begging for herself and asks only for her unborn child. His expression changes. He cannot walk away.',
      tvn_ko: 'tvN 약 36:00 — 지은탁의 어머니가 김신에게 살려달라고 애원하자 그가 차갑게 "인간사에 개입하지 않소"라고 말합니다. 하지만 그녀가 자신이 아닌 아이를 위해 간청하자 그의 표정이 변합니다. 외면할 수 없습니다.',
      meaning: '"인간사" = human affairs/matters, "에" = in/regarding, "개입하지 않소" = do not intervene (archaic). The "~소" ending is classic sageuk-style speech. Kim Shin\'s habit of non-intervention is his self-imposed exile from humanity.',
      meaning_ko: '"인간사"는 인간의 일, "에"는 ~에, "개입하지 않소"는 개입하지 않는다(고어체)입니다. "~소" 어미는 전통 사극체로, 김신이 인류로부터 스스로 유배된 모습을 드러냅니다.',
      example: 'A: "Aren\'t you going to help?" B: "인간사에 개입하지 않아요. It\'s not my place."',
      example_ko: 'A: "도와주러 안 갈 거예요?" B: "인간사에 개입하지 않아요. 제 일이 아니에요."',
      youtubeUrl: ''
    },
    {
      korean: '참 운도 좋은 사람이야',
      romanization: 'Cham undo joeun sarami-ya',
      english: 'What a lucky person you are',
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 36:50 — After Kim Shin saves Eun-tak\'s mother with a blue light from his hand, he shakes his head watching her revive in her pool of blood. He mutters: "참 운도 좋은 사람이야" — half-grudging, half-fond. He chose to care, and he knows it.',
      tvn_ko: 'tvN 약 36:50 — 김신이 손에서 나온 푸른빛으로 지은탁의 어머니를 살린 후, 그녀가 피 속에서 되살아나는 것을 보며 고개를 흔들고 중얼거립니다. "참 운도 좋은 사람이야" — 마지못한 듯하지만, 결국 그가 선택한 것입니다.',
      meaning: '"참" = truly/really, "운도 좋다" = to be very lucky, "사람이야" = what a person (casual exclamation). This structure "~도 좋은 사람이야" is a warm, slightly exasperated way to call someone lucky.',
      meaning_ko: '"참"은 정말, "운도 좋다"는 운이 매우 좋다, "사람이야"는 감탄의 구어체입니다. "~도 좋은 사람이야" 구조는 마지못해 인정하는 따뜻한 어감이 담긴 표현입니다.',
      example: 'A: "I found a wallet with 50,000 won in it today." B: "참 운도 좋은 사람이야! How does that happen to you?"',
      example_ko: 'A: "오늘 5만 원 들어있는 지갑을 주웠어." B: "참 운도 좋은 사람이야! 어떻게 그런 일이 다 생겨?"',
      youtubeUrl: ''
    },
    {
      korean: '왜 나한테 오는 거야?',
      romanization: 'Wae nahante oneun geoya?',
      english: 'Why are you coming to me?',
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 44:30 — 2006. Eight-year-old Eun-tak steps outside her house and encounters Wang Yeo (the Grim Reaper). She is startled and confused. She looks at him and asks: "왜 나한테 오는 거야?" She is nine years old and has spent her whole short life seeing things no one else can.',
      tvn_ko: 'tvN 약 44:30 — 2006년. 여덟 살 지은탁이 집 밖으로 나와 저승사자 왕여를 만납니다. 놀라고 당황한 그녀가 그를 바라보며 "왜 나한테 오는 거야?"라고 묻습니다. 아홉 살 아이가 평생 아무도 볼 수 없는 것들을 보며 살아온 장면입니다.',
      meaning: '"왜" = why, "나한테" = to me, "오는 거야?" = are you coming? (casual). Direct and innocent — a child\'s instinctive question. Polite: "왜 저한테 오는 거예요?" The casual form here makes her seem vulnerable and young.',
      meaning_ko: '"왜"는 왜, "나한테"는 나에게, "오는 거야?"는 반말 의문형입니다. 직접적이고 순수한 아이의 본능적 질문입니다. 공손한 표현: "왜 저한테 오는 거예요?"',
      example: 'A: "왜 나한테 오는 거야? I said I didn\'t want to talk." B: "I know. I just wanted to check on you."',
      example_ko: 'A: "왜 나한테 오는 거야? 얘기하기 싫다고 했잖아." B: "알아. 그냥 걱정돼서."',
      youtubeUrl: ''
    },
    {
      korean: '난 못 들어요',
      romanization: 'Nan mot deureoyo',
      english: "I can't hear you",
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 44:50 — Wang Yeo approaches eight-year-old Eun-tak and asks her if she can see him. She remembers her mother\'s warning never to talk to spirits. She turns away and says firmly: "난 못 들어요." Wang Yeo is surprised — no one, especially no child, has ever been able to see him.',
      tvn_ko: 'tvN 약 44:50 — 왕여가 여덟 살 지은탁에게 다가가 자신이 보이냐고 물어봅니다. 귀신에게 말을 걸지 말라는 어머니의 경고를 떠올린 지은탁이 돌아서며 단호하게 말합니다. "난 못 들어요." 왕여는 놀랍니다. 아무도, 특히 아이는 자신을 볼 수 없었습니다.',
      meaning: '"난" = I (casual, short for 나는), "못" = cannot, "들어요" = hear (polite). "못 듣다" means to be unable to hear — deliberate or physical. A child\'s stubborn refusal to acknowledge what she can clearly see and hear.',
      meaning_ko: '"난"은 나는의 줄임, "못"은 불가능, "들어요"는 듣다의 존댓말입니다. "못 듣다"는 의도적이거나 물리적으로 들을 수 없다는 뜻입니다. 보고 들을 수 있는 것을 외면하려는 아이의 완강한 거부입니다.',
      example: 'A: "Did you hear what I said?" B: "난 못 들었어요. The music was too loud."',
      example_ko: 'A: "제 말 들었어요?" B: "난 못 들었어요. 음악이 너무 커서요."',
      youtubeUrl: ''
    },
    {
      korean: '또 만나자',
      romanization: 'Tto manaja',
      english: "Let's meet again / See you again",
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 46:30 — Wang Yeo leaves after the old grandmother intervenes on Eun-tak\'s behalf. Before he goes, he looks back at the small girl and says casually: "또 만나자." For a Grim Reaper, this is not a warm farewell — it is a statement of fate. She will see him again.',
      tvn_ko: 'tvN 약 46:30 — 노할머니가 지은탁을 대신해 개입한 후 왕여가 물러납니다. 떠나기 전 그가 어린 지은탁을 돌아보며 담담하게 "또 만나자"고 말합니다. 저승사자에게 이 말은 따뜻한 작별이 아닌 운명의 선언입니다.',
      meaning: '"또" = again, "만나자" = let\'s meet (casual proposal). Common Korean farewell among friends. Casual and warm in everyday use, but with Wang Yeo saying it — weighted with inevitability. Polite: "또 만나요" or "또 뵐게요."',
      meaning_ko: '"또"는 다시, "만나자"는 만나다의 반말 청유형입니다. 친구 간에 흔히 쓰는 작별 인사입니다. 하지만 저승사자가 이 말을 하면 — 피할 수 없는 운명의 무게를 담게 됩니다. 공손한 표현: "또 만나요."',
      example: 'A: "I had so much fun today." B: "나도! 또 만나자. Same time next week?"',
      example_ko: 'A: "오늘 너무 재미있었어." B: "나도! 또 만나자. 다음 주 같은 시간에?"',
      youtubeUrl: ''
    },
    {
      korean: '이번 생도 수고했어요',
      romanization: 'Ibeon saengdo sugohae-sseoyo',
      english: 'You worked hard this life too',
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 42:00 — 1998. Eun-tak\'s mother dies in her previous life (the woman at the accident scene). Wang Yeo offers her the tea of forgetting. The ritual phrase he uses: "이번 생도 수고했어요." It is tender and formal at once — the Grim Reaper\'s standard acknowledgment for the departed.',
      tvn_ko: 'tvN 약 42:00 — 1998년. 지은탁의 어머니가 전생에서 죽습니다(사고 현장의 여성). 왕여가 망각의 차를 건네며 의식적으로 말합니다. "이번 생도 수고했어요." 따뜻하면서도 격식을 갖춘 — 저승사자의 인사말입니다.',
      meaning: '"이번 생" = this life, "도" = also/too, "수고했어요" = you worked hard / you did well. "수고했어요" is one of Korean\'s most meaningful phrases — acknowledging someone\'s effort and difficulty. Said to the dead, it is profound.',
      meaning_ko: '"이번 생"은 이번 생, "도"는 ~도, "수고했어요"는 수고하다의 과거 존댓말입니다. "수고했어요"는 한국어에서 가장 따뜻한 표현 중 하나로 상대의 노력을 인정합니다. 죽은 이에게 건네면 깊은 울림이 있습니다.',
      example: 'A: "I finally finished the project." B: "수고했어요. You must be exhausted."',
      example_ko: 'A: "드디어 프로젝트 끝냈어요." B: "수고했어요. 많이 피곤하겠네요."',
      youtubeUrl: ''
    },
    {
      korean: '어디 가세요?',
      romanization: 'Eodi gaseyo?',
      english: 'Where are you going?',
      partOfSpeech: 'expression',
      tvn: 'tvN approx. 57:30 — Present day 2016. Eun-tak (19) is walking home from school in the rain. Kim Shin is walking in the opposite direction. As they pass each other, he slows and asks quietly: "어디 가세요?" She glances at him and keeps walking. He watches her go, sensing something from nine hundred years ago.',
      tvn_ko: 'tvN 약 57:30 — 현재 2016년. 비를 맞으며 하교하는 지은탁(19세)과 반대 방향에서 걸어오는 김신. 스쳐 지나는 순간 그가 조용히 "어디 가세요?"라고 묻습니다. 그녀는 힐끗 보고 그냥 걷습니다. 그가 그녀의 뒷모습을 바라보며 9백 년 전의 무언가를 느낍니다.',

      : '&#127482;&#127480; 30 Korean Expressions &mdash; Guardian Episode 1';

    document.getElementById('nav-home').textContent  = isKo ? '홈' : 'Home';
    document.getElementById('nav-back').textContent  = isKo ? '도깨비로' : 'Back to Guardian';
    document.getElementById('bc-ep').textContent     = isKo ? '1화' : 'E1';
    document.getElementById('hdr-title').textContent = isKo ? '도깨비 — 1화' : 'Guardian — Episode 1';
    document.getElementById('hdr-meta').textContent  = isKo
      ? '한국어 표현 30개 · 쇼츠를 클릭해 장면에서 확인하세요'
      : '30 Korean Expressions · Click a Short to watch in context';
    document.getElementById('bm-ep-label').textContent = isKo ? '에피소드 저장' : 'Bookmark Episode';

    var dataExprs = EP_DATA.expressions || [];
    var html = '';

    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'guardian-e' + EP_NUM + 'x' + num;
      var bmUrl = 'dramas/guardian/episodes/ep' + EP_NUM + '.html#slot' + num;

      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.length > 10;
        var ytLabel = isKo
          ? (isLive ? '&#9654; 쇼츠 보기' : '&#9654; 쇼츠 준비중')
          : (isLive ? '&#9654; Watch Short' : '&#9654; Short Coming Soon');
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + escHtml(x.youtubeUrl) + '" target="_blank" rel="noopener">' + ytLabel + '</a>'
          : '<button class="btn-youtube pending">' + ytLabel + '</button>';

        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var sceneCtx = (isKo && x.tvn_ko) ? x.tvn_ko : (x.tvn || '');
        var exprNumLabel = isKo ? ('표현 ' + num) : ('Expression ' + num);
        var bmLabel = isKo ? '&#128278; 저장' : '&#128278; Bookmark';

        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNumLabel + ' &middot; Guardian E' + EP_NUM + '</div>';
        html += '<div class="expr-korean">' + escHtml(x.korean) + '</div>';
        html += '<div class="expr-roman">' + escHtml(x.romanization) + '</div>';
        html += '<div class="expr-english">' + escHtml(x.english) + '</div>';
        if (sceneCtx) html += '<div class="expr-scene">&#128249; ' + escHtml(sceneCtx) + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + bmLabel + '</button>';
        html += '</div></div>';

      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">' + (isKo ? '표현 ' : 'Expression ') + num + '</div>';
        html += '<div class="expr-korean" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Coming soon.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">&#9654; Short Coming Soon</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">&#128278; Bookmark</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
    syncBookmarkButtons();
  }

  function handleExprBm(num) {
    toggleBookmark('expression', 'guardian-e'+EP_NUM+'x'+num,
      '&#128172; Guardian E'+EP_NUM+' #'+num,
      'dramas/guardian/episodes/ep'+EP_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    if (!hasAgreed()) {
      window.location.href = '../../../index.html?redirect=' + encodeURIComponent(window.location.href);
      return;
    }
    if (!EP_DATA.available) {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;';
      overlay.innerHTML =
        '<div style="font-size:3rem;margin-bottom:1rem;">&#128274;</div>'
        + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent);margin-bottom:0.5rem;">Coming Soon</div>'
        + '<div style="font-size:0.9rem;color:var(--muted);margin-bottom:2rem;">This episode is not available yet.<br>Check back soon!</div>'
        + '<button onclick="history.back()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:0.95rem;font-weight:800;cursor:pointer;">&#9664; Go Back</button>';
      document.body.appendChild(overlay);
      return;
    }
    injectTermsModal();
    document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
    applyLang();
    buildExpressions();
    renderBookmarkBar();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });

</script>
</body>
</html>
