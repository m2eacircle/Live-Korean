<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Glory Shorts &mdash; Hidden K-Drama Stories</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .shorts-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }
    .short-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden;
      cursor: pointer; transition: var(--transition); text-decoration: none;
      box-shadow: 0 1px 6px rgba(124,58,237,0.05);
    }
    .short-row:hover { border-color: var(--accent); transform: translateX(4px); box-shadow: 0 4px 16px rgba(232,36,92,0.13); }
    .short-row.locked { opacity: 0.45; cursor: default; pointer-events: none; }
    .short-row-img {
      width: 90px; min-width: 90px; height: 68px;
      object-fit: cover; display: block;
    }
    .short-row-img-placeholder {
      width: 90px; min-width: 90px; height: 68px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--card2), var(--card3));
      flex-shrink: 0;
    }
    .short-row-body { flex: 1; padding: 10px 12px 10px 0; min-width: 0; }
    .short-row-num {
      font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--accent2); margin-bottom: 3px;
    }
    .short-row-title {
      font-size: 0.88rem; font-weight: 700; color: var(--text);
      line-height: 1.35; margin-bottom: 3px;
    }
    .short-row-title-ko {
      font-size: 0.84rem; font-weight: 700; color: var(--text);
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      word-break: keep-all; line-height: 1.35; margin-bottom: 3px;
    }
    .short-row-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 700; color: var(--accent);
      background: rgba(232,36,92,0.07); border: 1px solid rgba(232,36,92,0.18);
      border-radius: 20px; padding: 2px 8px;
    }
    .short-row-badge.coming {
      color: var(--muted);
      background: var(--card2); border-color: var(--border);
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <button class="btn-topbar-home" onclick="goHome()" title="Home">&#127968;</button>
    <div class="topbar-logo">
      <span class="logo-live">Hidden</span>
      <div class="logo-dot"></div>
      <span class="logo-korea">K-Drama Stories</span>
    </div>
  </div>
  <div class="topbar-right" id="topbar-lang-wrap"></div>
</header>

<main>
<div class="page-wrap">

  <nav class="nav-row">
    <button class="btn-nav home" onclick="goHome()">&#127968; <span id="nav-home">Home</span></button>
    <button class="btn-nav" onclick="window.location.href='index.html'">&#9664; <span id="nav-back">Back to The Glory</span></button>
  </nav>

  <nav class="breadcrumb">
    <a href="../../index.html">Hidden K-Drama Stories</a>
    <span class="sep">&#8250;</span>
    <a href="index.html" id="bc-drama">The Glory</a>
    <span class="sep">&#8250;</span>
    <span class="current" id="bc-shorts">YouTube Shorts</span>
  </nav>

  <div class="page-header">
    <div class="page-header-thumb">
      <img src="../../images/glory.jpg" alt="The Glory"
        onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#fce7f3,#fbcfe8)';this.parentElement.innerHTML='&#127797;';">
    </div>
    <div class="page-header-info">
      <div class="page-header-title" id="hdr-title">The Glory &mdash; YouTube Shorts</div>
      <div class="page-header-meta" id="hdr-meta">Coming Soon &middot; Did You Know?</div>
    </div>
  </div>

  <div class="bookmark-bar" id="bookmarkBar">
    <div class="bookmark-bar-head"><span class="bm-icon">&#128278;</span><span id="bm-bar-title">Your Bookmarks</span></div>
    <div class="bookmark-chips" id="bookmarkChips"></div>
  </div>

  <div class="section-label" id="section-label">&#127381; YouTube Shorts &mdash; The Glory</div>
  <div class="shorts-list" id="shortsList"></div>

</div>
</main>

<footer class="site-footer" id="lk-footer">
  <div class="footer-copy">&copy; 2025 m2ea Labs. All rights reserved.</div>
  <div><a class="footer-terms" href="../../terms.html">Terms of Use / &#51060;&#50857;&#50557;&#44288;</a></div>
</footer>

<script src="../../js/app.js"></script>
<script>

  /* Populate this array when stories are ready.
     Each entry: { num, titleEn, titleKo, img, emoji }
     Set ready:true when the short page exists. */
  var SHORTS = [];

  function goHome() { window.location.href = '../../index.html'; }

  function applyPageLang() {
    var isKo = getLang() === 'ko';
    document.documentElement.lang = isKo ? 'ko' : 'en';
    document.getElementById('nav-home').textContent     = isKo ? '홈' : 'Home';
    document.getElementById('nav-back').textContent     = isKo ? '더 글로리로' : 'Back to The Glory';
    document.getElementById('bc-drama').textContent     = isKo ? '더 글로리' : 'The Glory';
    document.getElementById('bc-shorts').textContent    = isKo ? '유튜브 쇼츠' : 'YouTube Shorts';
    document.getElementById('hdr-title').textContent    = isKo ? '더 글로리 \u2014 유튜브 쇼츠' : 'The Glory \u2014 YouTube Shorts';
    document.getElementById('bm-bar-title').textContent = isKo ? '북마크' : 'Your Bookmarks';
    document.getElementById('section-label').innerHTML  = isKo
      ? '&#127381; 유튜브 쇼츠 &mdash; 더 글로리'
      : '&#127381; YouTube Shorts &mdash; The Glory';
    buildList(isKo);
  }

  function buildList(isKo) {
    var list = document.getElementById('shortsList');
    if (!list) return;
    list.innerHTML = '';

    if (SHORTS.length === 0) {
      var msg = document.createElement('div');
      msg.className = 'coming-soon-bar';
      msg.innerHTML = '<div class="cs-badge">&#128679; ' + (isKo ? '준비중' : 'Coming Soon') + '</div>'
        + '<p>' + (isKo
          ? '<strong>더 글로리</strong> 유튜브 쇼츠 스토리를 열심히 준비하고 있습니다. 곧 업데이트될 예정입니다!'
          : 'YouTube Shorts stories for <strong>The Glory</strong> are coming soon. Check back!')
        + '</p>';
      list.appendChild(msg);
      document.getElementById('hdr-meta').textContent = isKo ? '준비중 · 알고 계셨나요?' : 'Coming Soon \u00b7 Did You Know?';
      return;
    }

    SHORTS.forEach(function(s) {
      var a = document.createElement('a');
      a.className = 'short-row' + (s.ready ? '' : ' locked');
      if (s.ready) a.href = 'shorts/short' + s.num + '.html';

      var img = document.createElement('img');
      img.className = 'short-row-img';
      img.alt = isKo ? s.titleKo : s.titleEn;
      img.src = s.img || '';
      img.onerror = (function(emoji, el) {
        return function() {
          var ph = document.createElement('div');
          ph.className = 'short-row-img-placeholder';
          ph.innerHTML = emoji;
          el.parentNode.replaceChild(ph, el);
        };
      })(s.emoji || '&#127797;', img);
      a.appendChild(img);

      var body = document.createElement('div');
      body.className = 'short-row-body';
      body.innerHTML =
        '<div class="short-row-num">&#127381; Story ' + s.num + '</div>'
        + '<div class="' + (isKo ? 'short-row-title-ko' : 'short-row-title') + '">'
        + (isKo ? s.titleKo : s.titleEn) + '</div>'
        + '<span class="short-row-badge' + (s.ready ? '' : ' coming') + '">'
        + (s.ready ? '&#9654; YouTube Short' : '&#128274; Coming Soon') + '</span>';
      a.appendChild(body);

      list.appendChild(a);
    });
  }

  window.addEventListener('DOMContentLoaded', function() {
    if (!hasAgreed()) { window.location.href = '../../index.html'; return; }
    injectTermsModal();
    document.getElementById('topbar-lang-wrap').innerHTML = buildLangToggle();
    applyPageLang();
    applyLang();
    renderBookmarkBar();
    syncBookmarkButtons();
  });

</script>
</body>
</html>
