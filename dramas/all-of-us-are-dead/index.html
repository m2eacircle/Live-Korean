<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All of Us Are Dead — Live Korea</title>
  <link rel="stylesheet" href="../../css/style.css">
  <meta name="theme-color" content="#ff2d78">
</head>
<body>
<header class="topbar" id="lk-topbar"></header>
<main id="mainContent">
<div class="page-wrap">
  <nav class="breadcrumb">
    <a href="../../index.html">Live Korea</a>
    <span class="sep">›</span>
    <span class="current">All of Us Are Dead</span>
  </nav>
  <div class="drama-header">
    <div class="drama-header-icon">🧟</div>
    <div class="drama-header-info">
      <div class="drama-header-title">All of Us Are Dead</div>
      <div class="drama-header-title-kr">지금 우리 학교는</div>
      <div class="drama-header-meta" id="hdrMeta">12 Episodes · 360 Shorts · Zombie Thriller</div>
    </div>
  </div>
  <div class="section-label" id="epLabel">📺 Episodes</div>
  <div class="episode-grid" id="episodeGrid"></div>
</div>
</main>
<footer class="site-footer" id="lk-footer"></footer>
<div id="termsModal" style="display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.88);overflow-y:auto;">
  <div style="max-width:560px;margin:40px auto;padding:0 16px 60px;">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:relative;">
      <button onclick="closeTermsModal()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.4rem;color:var(--muted);cursor:pointer;">✕</button>
      <div style="text-align:center;margin-bottom:14px;"><div style="font-size:2rem;">📄</div><div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--accent);">Terms of Use</div></div>
      <ul style="list-style:none;padding:0;margin:0 0 16px;"><li style="font-size:0.85rem;color:var(--text);line-height:1.75;padding:8px 0 8px 18px;border-bottom:1px solid var(--border);position:relative;"><span style="position:absolute;left:0;color:var(--accent);">▸</span>For <strong>personal study only</strong>.</li></ul>
      <button onclick="closeTermsModal()" style="width:100%;background:linear-gradient(135deg,var(--accent),#d91a60);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-size:0.95rem;font-weight:700;cursor:pointer;">Close ✕</button>
    </div>
  </div>
</div>
<script src="../../js/app.js"></script>
<script src="aouad-data.js"></script>
<script>
  function buildEpisodeGrid() {
    var lang = getLang();
    var grid = document.getElementById('episodeGrid');
    if (!grid) return;
    var html = '';
    for (var ep = 1; ep <= AOUAD_DATA.totalEpisodes; ep++) {
      var epId = 'aouad-ep' + ep;
      var saved = isBookmarked(epId);
      var label = lang === 'ko' ? ep + '화' : 'Episode ' + ep;
      html += '<a class="episode-card" href="ep' + ep + '.html">'
        + '<button class="bm-corner' + (saved ? ' saved' : '') + '" data-bm-id="' + epId + '"'
        + ' onclick="event.preventDefault();event.stopPropagation();toggleBookmark(\'ep\',\'' + epId + '\',\'AOUAD E' + ep + '\',\'dramas/all-of-us-are-dead/ep' + ep + '.html\')" title="Bookmark">🔖</button>'
        + '<div class="episode-num">' + ep + '</div>'
        + '<div class="episode-label">' + label + '</div>'
        + '<div class="episode-meta">30 ' + (lang === 'ko' ? '개 쇼츠' : 'shorts') + '</div>'
        + '</a>';
    }
    grid.innerHTML = html;
    if (lang === 'ko') {
      var m = document.getElementById('hdrMeta'); if (m) m.textContent = '12화 · 360개 쇼츠 · 좀비 스릴러';
      var l = document.getElementById('epLabel'); if (l) l.textContent = '📺 에피소드';
    }
  }
  window.addEventListener('DOMContentLoaded', function() {
    buildTopbar('../../index.html');
    buildFooter();
    applyLang();
    buildEpisodeGrid();
    syncBookmarkButtons();
  });
</script>
</body>
</html>
